patterns:
  component_pattern:
    example_file: "src/components/cohorts/WaitlistForm.tsx"
    example_lines: [1, 200]
    key_aspects:
      - "'use client' directive at top"
      - "useActionState hook for action wiring"
      - "Hidden input for stable form-level identifier (cohortSlug)"
      - "isPending drives disabled state on inputs + button label swap"
      - "form action={formAction} attribute"
      - "Conditional sourceTag input via prop (analogous to referralSource conditional rendering)"
    template_application_form: |
      'use client';
      import { useActionState, useEffect, useRef, useState } from 'react';
      import { APPLICATION_COMMITMENT_LEVELS, APPLICATION_COMMITMENT_LEVEL_LABELS, CONTENT_PILLARS, CONTENT_PILLAR_QUESTIONS } from '@/content/schemas';
      import { submitApplication, type ApplicationState } from './actions';
      const INITIAL: ApplicationState = { status: 'idle' };
      export function ApplicationForm({ cohortSlug }: { cohortSlug: string }) {
        const [state, formAction, isPending] = useActionState(submitApplication, INITIAL);
        const [autoTimezone, setAutoTimezone] = useState('');
        useEffect(() => { try { setAutoTimezone(Intl.DateTimeFormat().resolvedOptions().timeZone); } catch { setAutoTimezone(''); } }, []);
        const fieldErrors = state.status === 'error' ? state.fieldErrors : {};
        return <form action={formAction}>...{/* 7 Field subcomponents */}...</form>;
      }
  hook_pattern:
    not_applicable: "ce-3.2 introduces no custom hooks. useActionState is React's built-in hook; useState/useEffect are inline. Hook mocking via vi.mock('react') with importActual + override is used in tests (see WaitlistForm.test.tsx)."
  api_route_pattern:
    not_applicable: "ce-3.2 introduces no /api/* routes. Server action submitApplication takes its place. Action pattern (auth gate → safeParse → DB → email → redirect) mirrors submitWaitlist in src/components/cohorts/actions.ts."
  server_action_pattern:
    example_file: "src/components/cohorts/actions.ts"
    example_lines: [24, 88]
    key_aspects:
      - "'use server' module-level directive"
      - "Discriminated-union return type ({status:'idle'|'success'|'error', ...})"
      - "Zod safeParse on FormData early, return error state on parse failure"
      - "auth() called once; userId pulled from session.user.id"
      - "Cohort lookup via getCohortBySlug (manifest pattern from ce-1.2)"
      - "Best-effort Resend wrapped in try/swallow (DB row is canonical)"
      - "onConflictDoNothing or unique-violation catch for dedupe"
    template_action: |
      // submitApplication appended to actions.ts:
      export type ApplicationFieldErrors = Partial<Record<'background'|'goals'|'commitmentLevel'|'commitmentHours'|'timezone'|'pillarInterest'|'referralSource'|'cohortSlug'|'_form', string>>;
      export type ApplicationState = { status: 'idle' } | { status: 'error'; fieldErrors: ApplicationFieldErrors } | { status: 'success'; applicationId: string };
      export async function submitApplication(_prev: ApplicationState, formData: FormData): Promise<ApplicationState> {
        const session = await auth();
        if (!session?.user?.id || !session.user.email) return { status: 'error', fieldErrors: { _form: 'You must be signed in to apply.' } };
        const parsed = CohortApplicationInputSchema.safeParse({ ... });
        if (!parsed.success) { /* per-field errors via path[0] */ return { status: 'error', fieldErrors }; }
        const cohort = await getCohortBySlug(parsed.data.cohortSlug);
        if (!cohort) return { status: 'error', fieldErrors: { cohortSlug: 'Cohort not found.' } };
        if (cohort.meta.status !== 'open') return { status: 'error', fieldErrors: { _form: 'Applications for this cohort are closed.' } };
        const [waitlist] = await db.select(...).from(schema.cohortWaitlist).where(and(eq(...), eq(...))).limit(1);
        try {
          const [inserted] = await db.insert(schema.cohortApplications).values({ ..., waitlistId: waitlist?.id ?? null }).returning({ id: schema.cohortApplications.id });
          try { await sendCohortApplicationReceived({ to: session.user.email, cohort }); } catch {}
          redirect(`/cohorts/${parsed.data.cohortSlug}/apply?submitted=${inserted.id}`);
        } catch (err) {
          if (err && typeof err === 'object' && 'code' in err && (err as { code: string }).code === '23505') {
            return { status: 'error', fieldErrors: { _form: "You've already applied to this cohort." } };
          }
          throw err;
        }
      }
  email_helper_pattern:
    example_file: "src/lib/email/cohort-waitlist-confirmation.ts"
    example_lines: [1, 100]
    key_aspects:
      - "Resend client constructed inside the function (per-call), not module-level singleton"
      - "Env read inside function body (apiKey, from, appUrl) for testability"
      - "Silent return if RESEND_API_KEY or RESEND_FROM_COHORTS unset (degraded mode, not throw)"
      - "escapeHtml helper for any cohort-supplied prose in HTML body"
      - "formatDate with timeZone: 'UTC' to avoid jsdom timezone drift"
      - "Inline HTML template; text + html sent together"
      - "AUTH_URL fallback to 'https://fabled10x.com' when unset"
    template_email_helper: |
      // sendCohortApplicationReceived shape:
      export async function sendCohortApplicationReceived({ to, cohort }: { to: string; cohort: LoadedEntry<Cohort> }): Promise<void> {
        const apiKey = process.env.RESEND_API_KEY;
        const from = process.env.RESEND_FROM_COHORTS;
        const appUrl = process.env.AUTH_URL ?? 'https://fabled10x.com';
        if (!apiKey || !from) return;
        const accountUrl = `${appUrl}/products/account/cohorts`;
        const meta = cohort.meta;
        const text = [...].join('\n');
        const html = `<!doctype html>...${escapeHtml(meta.title)}...`;
        const resend = new Resend(apiKey);
        await resend.emails.send({ from, to, subject: `Application received — ${meta.title}`, text, html });
      }
  page_pattern:
    example_file: "src/app/cohorts/[slug]/page.tsx"
    example_lines: [1, 200]
    key_aspects:
      - "async function Page({ params }: { params: Promise<{ slug: string }> })"
      - "await params first, then awaited content loader call"
      - "notFound() + early return guard pattern (knowledge.yaml#notfound_return_guard)"
      - "Static metadata export (Metadata typed); apply page adds robots: { index: false, follow: false }"
      - "Container with as='main' className='py-16' wrapper"
    template_apply_page: |
      // src/app/cohorts/[slug]/apply/page.tsx
      import type { Metadata } from 'next';
      import Link from 'next/link';
      import { notFound, redirect } from 'next/navigation';
      import { eq, and } from 'drizzle-orm';
      import { Container } from '@/components/site/Container';
      import { auth } from '@/auth';
      import { db, schema } from '@/db/client';
      import { getCohortBySlug } from '@/lib/content/cohorts';
      import { CohortDetailHero } from '@/components/cohorts/CohortDetailHero';
      import { ApplicationForm } from '@/components/cohorts/ApplicationForm';
      export const metadata: Metadata = { title: 'Apply', robots: { index: false, follow: false } };
      export default async function ApplyPage({ params }: { params: Promise<{ slug: string }> }) {
        const { slug } = await params;
        const entry = await getCohortBySlug(slug);
        if (!entry) { notFound(); return; }
        const session = await auth();
        if (!session?.user?.id || !session.user.email) redirect(`/login?callbackUrl=%2Fcohorts%2F${encodeURIComponent(slug)}%2Fapply`);
        if (entry.meta.status !== 'open') return <NotOpenView entry={entry} />;
        const [existing] = await db.select({ id: schema.cohortApplications.id }).from(schema.cohortApplications).where(and(eq(schema.cohortApplications.cohortSlug, slug), eq(schema.cohortApplications.userId, session.user.id))).limit(1);
        if (existing) return <AlreadyAppliedView entry={entry} />;
        return <ApplyView entry={entry} email={session.user.email} slug={slug} />;
      }
  proxy_pattern:
    example_file: "proxy.ts"
    example_lines: [1, 32]
    key_aspects:
      - "NextRequest-typed function exported as 'proxy' (Next.js 16 convention, not 'middleware')"
      - "config.matcher array of path globs"
      - "Path-prefix check via startsWith() inside function body; not literal matcher comparison"
      - "Session cookie name dual-check (authjs.session-token + __Secure-authjs.session-token for HTTPS)"
      - "Redirect to /login with ?callbackUrl=<pathname+search> for unauthed gated paths"
    template_proxy_extension: |
      // proxy.ts (existing sa-2.3 + ce-3.2 additions):
      export function proxy(request: NextRequest) {
        const { pathname } = request.nextUrl;
        const isGated =
          pathname.startsWith('/products/account') ||
          pathname.startsWith('/api/products/downloads') ||
          // ADDED BY ce-3.2:
          (pathname.startsWith('/cohorts/') && (pathname.endsWith('/apply') || pathname.endsWith('/checkout'))) ||
          pathname.startsWith('/admin/');
        if (!isGated) return NextResponse.next();
        if (hasSessionCookie(request)) return NextResponse.next();
        const loginUrl = new URL('/login', request.url);
        loginUrl.searchParams.set('callbackUrl', pathname + request.nextUrl.search);
        return NextResponse.redirect(loginUrl);
      }
      export const config = {
        matcher: [
          '/products/account/:path*',
          '/api/products/downloads/:path*',
          // ADDED BY ce-3.2:
          '/cohorts/:slug/apply',
          '/cohorts/:slug/checkout',
          '/admin/:path*',
        ],
      };
  test_pattern_action:
    example_file: "src/components/cohorts/__tests__/actions.test.ts"
    example_lines: [1, 549]
    key_aspects:
      - "vi.hoisted() for all mocked refs"
      - "vi.mock('@/db/client', ...) with chained insert/values/onConflictDoNothing/returning"
      - "vi.mock('@/auth', () => ({ auth: mockAuth }))"
      - "vi.mock('@/lib/content/cohorts', ...)"
      - "vi.mock('@/lib/email/cohort-application-received', ...)"
      - "vi.mock('next/navigation', () => ({ redirect: vi.fn(() => { throw new Error('NEXT_REDIRECT'); }) })) — redirect throws"
      - "Test fixture object COHORT_FIXTURE with .meta + .slug + .Component for LoadedEntry shape"
      - "beforeEach resets all mocks; afterEach restores process.env"
  test_pattern_form:
    example_file: "src/components/cohorts/__tests__/WaitlistForm.test.tsx"
    example_lines: [1, 200]
    key_aspects:
      - "useActionState mocked via vi.mock('react') with importActual + override (knowledge.yaml#useActionState_mock_pattern from ce-2.2)"
      - "useActionStateMock.mockReturnValue([state, formAction, isPending]) drives every render"
      - "Action import mocked: vi.mock('../actions', () => ({ submitApplication: vi.fn() }))"
      - "render(<ApplicationForm cohortSlug='...' />) + screen.getByRole/getByLabelText"
      - "Pending-state test sets isPending=true, asserts disabled+spinner copy"
      - "FieldErrors-state test sets state={status:'error', fieldErrors:{background:'...'}}, asserts role='alert' contains message"
  test_pattern_email:
    example_file: "src/lib/email/__tests__/cohort-waitlist-confirmation.test.ts"
    example_lines: [1, 200]
    key_aspects:
      - "vi.hoisted Resend mock with emails.send fn"
      - "vi.mock('resend', () => ({ Resend: ResendSpy }))"
      - "process.env.RESEND_API_KEY + RESEND_FROM_COHORTS set in beforeEach; restored in afterEach"
      - "Missing-env test deletes one env var, asserts emails.send not called"
      - "HTML escape test passes title with quotes/&/< — asserts no broken markup, asserts escaped entities present"
      - "Plain-text body assertion via mockSendCalls[0][0].text.includes(trackingUrl)"
  test_pattern_page:
    example_file: "src/app/cohorts/[slug]/__tests__/page.test.tsx (existing ce-1.3 + ce-2.2 modifications)"
    example_lines: [1, 200]
    key_aspects:
      - "async server component testing pattern (knowledge.yaml#async_server_component_testing)"
      - "vi.mock for auth, db/client, content/cohorts, ApplicationForm, CohortDetailHero, next/navigation (notFound, redirect)"
      - "renderPage helper: const jsx = await Page({ params: Promise.resolve({slug:'...'}) }); return render(jsx);"
      - "notFound + redirect mocked to track calls (knowledge.yaml#notfound_return_guard)"
      - "Existing-application select chain mocked: db.select().from().where().limit() → resolves to []"

