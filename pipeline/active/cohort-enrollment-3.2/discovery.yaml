divergences_from_planning_doc:
  - id: middleware_is_proxy_ts
    summary: "Planning doc says MODIFY middleware.ts; actual file is proxy.ts (Next.js 16 renamed middleware → proxy per sa-2.3)."
    impact: "Implementation will modify /home/travis/Projects/fabled10x/proxy.ts. Tests file is src/__tests__/proxy.cohort.test.ts (NOT middleware.cohort.test.ts as planning doc shows). Existing proxy.ts uses path-prefix check (startsWith), not a literal matcher list — extension adds '/cohorts/' + '/apply' check rather than appending '/cohorts/:slug/apply' to matcher."
    captured_in: "knowledge.yaml#storefront-auth-2.3.next16_proxy_convention"
  - id: form_field_validation_split
    summary: "ApplicationForm uses HTML5 native validation (required, minLength, max) on the client and Zod CohortApplicationInputSchema on the server."
    impact: "Tests assert per-field error rendering from state.fieldErrors, not from client-side validation; client validation is HTML5 native and not asserted in unit tests."
  - id: error_code_23505_unique_violation
    summary: "Action catches PostgreSQL unique-violation error code 23505 from (cohort_slug, user_id) constraint."
    impact: "Test must shape thrown error with .code = '23505'. Plain Error throws should propagate, not be caught."
  - id: redirect_test_pattern
    summary: "submitApplication calls redirect(`/cohorts/${slug}/apply?submitted=...`) on success. redirect() in next/navigation THROWS to short-circuit — vitest treats it as a thrown error caught by the action runtime."
    impact: "Tests mock redirect() to a throw or capture the call before throw. Action test expects throw or asserts redirect was called with correct URL."
  - id: middleware_matcher_test_pattern_inapplicable
    summary: "Planning doc test sketch checks 'matcher includes /cohorts/foo/apply' but proxy.ts uses path-prefix logic, not a literal matcher list."
    impact: "Tests instead invoke proxy(request) with a NextRequest fixture and assert redirect-to-login for unauthenticated /cohorts/foo/apply, /cohorts/foo/checkout, /admin/cohorts/applications; pass-through for /cohorts and /cohorts/foo (non-gated detail page)."

