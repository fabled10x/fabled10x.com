analysis:
  total_items: 11
  complexity: L
  estimated_tests: 50  # 7 page + 4 proxy + 11 action + 8 form + 4 email + sec/edge/data/perm/contract additions
  notes: |
    Cross-cutting wiring section. Three new files (page, ApplicationForm, email
    helper), three modifications (proxy, cohort detail page, actions). All
    pieces are interdependent — the apply page mounts ApplicationForm which
    posts to submitApplication which fires the email. None ship in isolation.

