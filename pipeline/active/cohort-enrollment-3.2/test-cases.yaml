security_tests:
  - id: "sec_spoofing_action_requires_session_user_id"
    description: "submitApplication: auth() returns { user: { email: 'a@b.c' } } WITHOUT id → treated as unauthenticated, returns _form error (defends against malformed/incomplete session)"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: security
    stride_category: spoofing
    target: "submitApplication"
    vectors: ["session.user.id undefined", "session.user.email undefined", "session null"]
    expected: "All three return { status:'error', fieldErrors:{_form:'must be signed in'} }; no DB write"
    checklist_items: [6]
  - id: "sec_tampering_cohort_slug_regex_rejects_traversal"
    description: "submitApplication: cohortSlug='../admin' or '../../etc/passwd' → Zod regex rejects, no DB write, no getCohortBySlug call"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: security
    stride_category: tampering
    target: "submitApplication CohortApplicationInputSchema"
    vectors: ["../admin", "../../etc/passwd", "cohort space slug"]
    expected: "fieldErrors.cohortSlug; mockInsert not called"
    checklist_items: [6]
  - id: "sec_tampering_xss_in_text_fields_passes_through_to_db"
    description: "submitApplication: background='<script>alert(1)</script>' → Zod accepts (it's prose text within length limits), persists as plain text. Email helper escapes when echoing cohort title. (Field never echoed to user-controlled HTML at this stage; later admin dashboard must escape.)"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: security
    stride_category: tampering
    target: "submitApplication"
    vectors: ["background with <script>", "goals with javascript:"]
    expected: "Insert called with raw string (Zod does not strip); no execution path renders unsanitized text in this section"
    checklist_items: [6]
  - id: "sec_tampering_userid_not_overridable_from_form"
    description: "submitApplication: FormData with extra fields { userId: 'attacker-id' } → ignored; persisted userId is always session.user.id"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: security
    stride_category: tampering
    target: "submitApplication"
    vectors: ["FormData userId override attempt"]
    expected: "values() receives userId = session.user.id, not the form-supplied 'attacker-id'"
    checklist_items: [6]
  - id: "sec_info_disclosure_resend_error_not_leaked"
    description: "submitApplication: sendCohortApplicationReceived rejects with Error('rk_live_SECRET_xyz invalid api key') → action still returns redirect; error message NEVER appears in returned state or in console output"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: security
    stride_category: information_disclosure
    target: "submitApplication best-effort email block"
    vectors: ["Resend error message containing API key"]
    expected: "Action redirect still called; logSpy/errorSpy contents contain no 'rk_live_' substring"
    checklist_items: [6]
  - id: "sec_info_disclosure_page_existing_select_columns_minimal"
    description: "Apply page: existing-application select chain queries only { id } column — never selects background/goals/userId of OTHER users (which would be impossible per where clause but defends scope)"
    file: "src/app/cohorts/[slug]/apply/__tests__/page.test.tsx"
    test_type: security
    stride_category: information_disclosure
    target: "ApplyPage existing-application probe"
    vectors: ["select chain inspected via mock call args"]
    expected: "First arg to db.select() is { id: schema.cohortApplications.id } — no other columns"
    checklist_items: [1]
  - id: "sec_dos_action_unique_constraint_dedupes"
    description: "submitApplication: re-submit with same cohortSlug + same session.user.id → second insert throws { code: '23505' } → returns _form 'already applied' (no infinite-spam path)"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: security
    stride_category: denial_of_service
    target: "submitApplication unique constraint catch"
    vectors: ["repeat-submit race"]
    expected: "Second call returns error state, no double redirect"
    checklist_items: [6]
  - id: "sec_dos_action_zod_rejects_oversize_payload"
    description: "submitApplication: background = 'x'.repeat(2001) → Zod fails fast, no DB write attempt (defends against memory exhaustion via giant insert)"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: security
    stride_category: denial_of_service
    target: "submitApplication body-length check"
    vectors: ["background > 2000 chars", "goals > 1500 chars", "referralSource > 200 chars"]
    expected: "fieldErrors on the oversize field; mockInsert not called"
    checklist_items: [6]
  - id: "sec_elevation_action_rejects_non_open_status"
    description: "submitApplication: cohort.meta.status in ['announced', 'closed', 'enrolled', 'shipped'] → _form 'closed', no DB write (defends against operator status mismatch — server snapshot is source of truth, not form payload)"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: security
    stride_category: elevation_of_privilege
    target: "submitApplication status check"
    vectors: ["status announced", "status closed", "status enrolled", "status shipped"]
    expected: "All 4 return _form error; mockInsert not called"
    checklist_items: [6]
  - id: "sec_proxy_redirects_unauth_apply_to_login"
    description: "proxy.ts: /cohorts/<slug>/apply request with no session cookie → 307 redirect to /login?callbackUrl=/cohorts/<slug>/apply"
    file: "src/__tests__/proxy.cohort.test.ts"
    test_type: security
    stride_category: elevation_of_privilege
    target: "proxy() gating"
    vectors: ["/cohorts/foo/apply unauthed", "/cohorts/foo/checkout unauthed", "/admin/cohorts/applications unauthed"]
    expected: "NextResponse.redirect with /login URL and correct callbackUrl param"
    checklist_items: [3]
  - id: "sec_email_html_escape_against_xss_in_title"
    description: "sendCohortApplicationReceived: cohort title='<script>alert(1)</script>' → emails.send html arg contains '&lt;script&gt;' not raw '<script>'; subject also safely echoed (Resend treats subject as plain text)"
    file: "src/lib/email/__tests__/cohort-application-received.test.ts"
    test_type: security
    stride_category: tampering
    target: "sendCohortApplicationReceived"
    vectors: ["title with <script>", "title with quotes", "title with &"]
    expected: "html arg has escaped entities; no raw <script substring"
    checklist_items: [10]

