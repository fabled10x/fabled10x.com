error_recovery_tests:
  - id: "err_action_resend_email_failure_swallowed"
    description: "submitApplication: sendCohortApplicationReceived rejects with Error('Resend 500') → DB row remains, redirect still called, no exception bubbles to caller"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: error_recovery
    scenario: partial_failure
    expected: "Row persisted; redirect called; action does not return error state from email path"
    checklist_items: [6]
  - id: "err_action_missing_resend_env_no_throw"
    description: "submitApplication: RESEND_API_KEY missing → sendCohortApplicationReceived returns early (no throw) → action proceeds to redirect"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: error_recovery
    scenario: api_500
    expected: "Row persisted; redirect called; emails.send never invoked"
    checklist_items: [6, 10]
  - id: "err_action_unique_violation_not_a_throw"
    description: "submitApplication: 23505 error caught and converted to fieldErrors._form, NOT thrown up to caller (which would be a crash, not graceful UX)"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: error_recovery
    scenario: partial_failure
    expected: "Returns error state; no thrown error from action"
    checklist_items: [6]
  - id: "err_action_non_23505_db_error_rethrows"
    description: "submitApplication: db.insert throws { code: 'EHOSTUNREACH' } (not 23505) → action re-throws (propagates to framework's error boundary). This prevents silent data loss from being masked as a UX message."
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: error_recovery
    scenario: api_500
    expected: "Action call rejects with original error; mockInsert was attempted; mockRedirect NOT called"
    checklist_items: [6]
  - id: "err_email_send_rejects_propagates_to_caller"
    description: "sendCohortApplicationReceived: emails.send rejects → helper throws the same error (caller swallows). Helper does NOT silently absorb the error itself — separation of concerns."
    file: "src/lib/email/__tests__/cohort-application-received.test.ts"
    test_type: error_recovery
    scenario: api_500
    expected: "Helper rejects with original Resend error"
    checklist_items: [10]
  - id: "err_page_db_failure_propagates_to_boundary"
    description: "Apply page: db.select on existing-application probe rejects → page throws, framework error boundary catches (no try/catch inside page)"
    file: "src/app/cohorts/[slug]/apply/__tests__/page.test.tsx"
    test_type: error_recovery
    scenario: api_500
    expected: "Page invocation rejects; render is never attempted with stale data"
    checklist_items: [1]
  - id: "err_proxy_no_session_cookie_consistent_redirect"
    description: "proxy(): three different gated paths (/cohorts/foo/apply, /cohorts/bar/checkout, /admin/cohorts/applications) with no session → consistent /login?callbackUrl=<original-path> redirect for all three (no inconsistent error pages)"
    file: "src/__tests__/proxy.cohort.test.ts"
    test_type: error_recovery
    scenario: stale_data
    expected: "All three redirects target /login with the appropriate callbackUrl"
    checklist_items: [3]

data_integrity_tests:
  - id: "data_consistency_unique_per_user_per_cohort"
    description: "Action insert respects UNIQUE(cohort_slug, user_id) shipped by ce-2.1: re-insert of same pair raises 23505 catch path, NOT silent overwrite"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: data_integrity
    concern: consistency
    expected: "Second insert attempt → 23505 → fieldErrors._form 'already applied'"
    checklist_items: [6]
  - id: "data_precision_commitment_hours_persisted_as_int"
    description: "commitmentHours = '8' FormData → coerced and persisted as integer 8, NOT string '8' or float 8.0"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: data_integrity
    concern: precision
    expected: "values() call includes commitmentHours: 8 (typeof 'number', Number.isInteger true)"
    checklist_items: [6]
  - id: "data_sensitivity_email_not_logged_on_failure"
    description: "On any error path (Zod fail, DB fail, Resend fail), console.log/error contents do NOT contain session.user.email or RESEND_API_KEY substring"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: data_integrity
    concern: sensitivity
    expected: "logSpy + errorSpy capture string set excludes email + api key"
    checklist_items: [6]
  - id: "data_consistency_waitlist_link_email_keyed"
    description: "Waitlist lookup keyed on (cohortWaitlist.email == session.user.email, cohortWaitlist.cohortSlug == input.cohortSlug). Different-email waitlist row for same slug → waitlistId stays null"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: data_integrity
    concern: consistency
    expected: "select called with where(and(eq(email, sessionEmail), eq(slug, inputSlug))); no fuzzy match"
    checklist_items: [6]
  - id: "data_serialization_email_html_escape_completeness"
    description: "escapeHtml() in cohort-application-received.ts replaces ALL of &, <, >, \", ' in cohort.meta.title — assert each character escaped to its entity"
    file: "src/lib/email/__tests__/cohort-application-received.test.ts"
    test_type: data_integrity
    concern: serialization
    expected: "& → &amp;, < → &lt;, > → &gt;, \" → &quot;, ' → &#39; — every transform applied exactly once"
    checklist_items: [10]
  - id: "data_consistency_cohort_status_snapshot_at_action_time"
    description: "submitApplication: cohort.meta.status read once from getCohortBySlug; the snapshot value (not a re-fetched value) drives the gate. Single-source-of-truth invariant."
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: data_integrity
    concern: consistency
    expected: "getCohortBySlug called exactly once per action call; status gate uses that result"
    checklist_items: [6]

