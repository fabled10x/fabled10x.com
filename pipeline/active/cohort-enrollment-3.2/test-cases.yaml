contract_tests:
  - id: "contract_action_idle_state_shape"
    description: "ApplicationState idle shape: { status: 'idle' } — no extra keys"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: contract
    endpoint: "ACTION submitApplication initial state"
    scenario: idle_shape
    expected_shape: "{ status: 'idle' }"
    checklist_items: [6]
  - id: "contract_action_error_state_shape"
    description: "ApplicationState error shape: { status: 'error', fieldErrors: ApplicationFieldErrors } where ApplicationFieldErrors is Partial<Record<...known keys..., string>>"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: contract
    endpoint: "ACTION submitApplication error return"
    scenario: error_shape
    expected_shape: "{ status: 'error'; fieldErrors: Partial<Record<'background'|'goals'|'commitmentLevel'|'commitmentHours'|'timezone'|'pillarInterest'|'referralSource'|'cohortSlug'|'_form', string>> }"
    checklist_items: [6]
  - id: "contract_action_success_redirects_not_returns_state"
    description: "ApplicationState success path: action calls redirect() (throws NEXT_REDIRECT in framework) — does NOT return { status:'success' } object to caller via normal completion. (success state exists in type-union as a documented possibility but is not the actual happy path.)"
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: contract
    endpoint: "ACTION submitApplication success path"
    scenario: success_shape
    expected_shape: "throw NEXT_REDIRECT (redirect call) — no { status:'success' } returned to client"
    checklist_items: [6]
  - id: "contract_field_errors_key_set"
    description: "ApplicationFieldErrors key set covers exactly the 9 documented keys (8 fields + _form). Any other key in fieldErrors would indicate a Zod path[0] not in CohortApplicationInputSchema."
    file: "src/components/cohorts/__tests__/actions.submitApplication.test.ts"
    test_type: contract
    endpoint: "TYPE ApplicationFieldErrors"
    scenario: error_shape
    expected_shape: "Partial<Record<KnownKey, string>> with exact KnownKey union from typescript_types"
    checklist_items: [6]
  - id: "contract_email_helper_resend_send_args"
    description: "sendCohortApplicationReceived: emails.send first arg shape = { from: string, to: string, subject: string, text: string, html: string } — no extra keys, no missing required keys"
    file: "src/lib/email/__tests__/cohort-application-received.test.ts"
    test_type: contract
    endpoint: "Resend emails.send call"
    scenario: success_shape
    expected_shape: "{ from: string; to: string; subject: string; text: string; html: string }"
    checklist_items: [10]

