    test_type: edge_case
    category: state
    input: "Idempotent existing-application select"
    expected: "Multiple renders all show already-applied view"
    checklist_items: [1]
  - id: "edge_state_email_intl_format_date_utc_anchor"
    description: "sendCohortApplicationReceived: meta.startDate='2026-09-14' → formatDate uses '${iso}T00:00:00Z' and timeZone:'UTC' → output stable as 'September 14, 2026' regardless of test runner TZ"
    file: "src/lib/email/__tests__/cohort-application-received.test.ts"
    test_type: edge_case
