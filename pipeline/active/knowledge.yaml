        site mount in 3.2. Audit treats this as infrastructure, same as so-3.1 / so-2.3.

        '
  blocker_cleared: 'styling-overhaul Phase 3 (Material Language): so-3.2 (BrushstrokeSeam)
    COMPLETE.

    Phase 3 is now 2/3 complete. so-3.3 (forbidden-pattern sentinel) is the canonical

