build_log_overhaul_1_2:
  completed_at: '2026-06-08'
  patterns_established:
    - description: Both timestamps passed as args — function never calls Date.now()
        internally.
      file: src/lib/build-log/relative-time.ts
      reusable_for: Any SSR-rendered relative-time / "time-since" formatter where
        the page captures one nowIso at the top of the render and threads it down
        to every component. Eliminates SSR ↔ hydration mismatches that Intl.RelativeTimeFormat
        and Date.now()-in-component patterns introduce. Consumers in build-log 3.1
        (Hero), enriched JobCard (2.2), and RecentActivity (3.3).
    - description: ISO date slice (not Date round-trip) for absolute-date fallback
        past the relative window.
      file: src/lib/build-log/relative-time.ts
      reusable_for: Anywhere a non-UTC ISO timestamp must degrade to its calendar
        date without TZ drift. `iso.slice(0, 10)` is unconditionally safe; `new Date(iso).toISOString().slice(0,
        10)` shifts to UTC and can flip the calendar day at offset boundaries. Same
        principle as the existing buyer-CSV export date-only formatting under the
        storefront bundle.
  gotchas:
    - Hand-rolled bucket copy ("3m ago", "yesterday", "on YYYY-MM-DD") instead of
      Intl.RelativeTimeFormat. Intl is locale-aware ("3 minutes ago" varies by viewer
      locale) which is the exact thing that breaks SSR ↔ hydration when the server's
      intl resolution differs from the client's. Hand-rolled output is deterministic,
      matches the brand-voice copy register, and is locked by data_consistency_ssr_hydration_safe
      test.
    - Future timestamps (clock skew, hand-built fixtures) degrade to 'just now' rather
      than emitting "in 3 minutes". Avoids both a UX wart and the spec ambiguity of
      negative-delta copy. Locked by edge_input_future_timestamp.
    - Empty-string return (not throw) for null/undefined/invalid input. Consumers
      conditionally render the wrapper element on empty string; throwing would cascade
      into the build-log's "right now" Hero where a single bad timestamp would unmount
      the whole panel.
  reusable_utilities:
    - function: formatRelativeTime(iso, nowIso)
      file: src/lib/build-log/relative-time.ts
      purpose: SSR-safe pure formatter mapping (iso, nowIso) → "just now" | "Nm ago"
        | "Nh ago" | "yesterday" | "N days ago" | "N weeks ago" | "on YYYY-MM-DD".
        Six relative branches + null/undefined/invalid → empty string. Branch thresholds
        (60s, 60min, 24h, 14d, 30d) are in-module constants tunable without touching
        consumers.
  deferred_followups:
    - If a future section needs the bucket thresholds (60s/60m/24h/14d/30d) tunable
      from outside the module (e.g., a power-user "verbose timestamps" mode), promote
      them to exported consts. Current planning judgement keeps them private.
    - The "%N weeks ago" branch uses Math.floor(days / 7) so 14d→2w, 20d→2w, 21d→3w
      — the threshold is on days, not weeks. If the brand copy later wants "1 week
      ago" to appear at 7d (not 14d), drop the floor of the lower bound. Both unit_weeks_2
      (14d=2w) and unit_days_13_boundary (13d=13d) lock the current behavior.
