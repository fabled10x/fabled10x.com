      rationale: "DRY across sections when 2+ files use the same truncate pattern. Single file is fine for now (sa-2.1 only)."

  inherited_open_question_status:
    - id: loader_build_incompat
      severity: P1
      status: "LIKELY RESOLVED — npm run build succeeded cleanly for the first time with content-detail routes present. Observation, not verified fix. Confirm in 2.2 when next build runs."
