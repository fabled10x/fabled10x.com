styling-overhaul-2.1:
  completed_at: '2026-06-06'
  patterns_established:
    - id: next_font_handshake
      description: 'Three-family next/font/google handshake: layout.tsx loader calls

        WRITE --font-display / --font-body / --font-mono onto <html> via

        font.variable; globals.css @theme inline RE-DECLARES the same alias

        names so Tailwind utilities (font-display, font-body, font-mono)

        resolve through them. The CSS reads `--font-display: var(--font-display)`

        — self-referential because next/font writes the variable at runtime

        and @theme re-declares it at build-time for the Tailwind class scanner.

        Pattern: NEXT 2.0+ canonical font loading inside the App Router.

        '
      file: src/app/layout.tsx + src/app/globals.css
      reusable_for:
        - Any future font family change (so-2.2/2.3/2.4 consume these CSS vars)
        - Any next/font/google variable-binding work (e.g., adding a 5th family —
          though brand spec forbids)
    - id: brand_font_test_scan_pattern
      description: "src/__tests__/brand/fonts.test.ts uses the readFileSync + theme-block\n\
        regex pattern from so-1.1 + so-1.2, PLUS a third extraction technique:\nper-loader\
        \ call-shape scans via regex on layoutSrc to assert each\nfont's weight /\
        \ subsets / display options. Pattern:\n  const cinzelCall = layoutSrc.match(/Cinzel\\\
        s*\\(\\s*\\{([\\s\\S]*?)\\}\\s*\\)/);\n  expect(cinzelCall?.[1]).toMatch(/weight:\\\
        s*\\[\\s*['\"]900['\"]\\s*\\]/);\nAvoids importing layout.tsx (which requires\
        \ mocking next/font/google).\nFile-content scan is the simplest way to assert\
        \ source-file shape\ninvariants for next/font configuration.\n"
      file: src/__tests__/brand/fonts.test.ts
      reusable_for:
        - Any future test asserting next/font loader argument shape
        - so-2.2/2.3/2.4 typography sentinels that need to read globals.css
    - id: layout_test_mock_alignment
      description: 'vi.mock(''next/font/google'', ...) in layout.test.tsx must EXACTLY

        mirror the import surface of layout.tsx. If layout.tsx changes its

        font family imports, the mock must be updated in the same edit or

        the test file fails to evaluate (Cinzel is not a function).

        During TDD red, this means temporarily either (a) keeping BOTH the

        old + new mock entries so layout.tsx can load with stale imports,

        OR (b) accepting that layout.test.tsx fails entirely until green

        lands. Both approaches were used in so-2.1 (linter chose (a)).

        '
      file: src/app/__tests__/layout.test.tsx
      reusable_for:
        - Any future layout.tsx font / module-config change
  gotchas:
    - 'next/font''s variable name and the @theme alias name share the same

      string (`--font-display`). The self-referential `--font-display: var(--font-display)`

      in @theme inline is INTENTIONAL — Tailwind 4''s @theme block declares the

      utility resolution name; next/font writes the runtime value onto <html>.

      Stripping the @theme declaration breaks Tailwind utility classes

      (font-display, font-body, font-mono); stripping the next/font call breaks

