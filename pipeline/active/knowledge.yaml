    one test file added (src/__tests__/brand/tokens.test.ts, 38 tests),

    one obsolete test file deleted (src/app/__tests__/globals-css.test.ts).

    No schemas, no API, no DB, no UI components, no hooks, no forms, no nav.

    38 section tests cover all 11 checklist items at 100%. Full suite: 936 passed
    |

