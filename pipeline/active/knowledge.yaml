cohort-enrollment-4.1:
  completed_at: '2026-06-06'
  patterns_established:
    - id: admin_layout_allowlist_gate
      description: 'Server-side admin layout pattern. Async RSC at src/app/admin/layout.tsx

        does (1) auth() session lookup, redirect to /login on no session,

        (2) parseAllowlist(process.env.ADMIN_EMAILS) → split/trim/lowercase,

        (3) compare session.user.email.toLowerCase() against allowlist,

        (4) render Forbidden state if not in allowlist, else wrap children

        in admin chrome (<header><nav>...). Deny-by-default on empty/missing

        env var. Every nested route under /admin/* inherits the gate.

        '
      file: src/app/admin/layout.tsx
      reusable_for:
        - 'email-funnel /admin/email-funnel dashboard (planning doc explicitly says:
          ADMIN_EMAILS is shared with email-funnel 4.4)'
        - any future admin surface in this codebase
    - id: rsc_form_per_button_server_actions
      description: 'Next.js 16 pattern for multi-decision admin forms. Single <form>
        with

        a default `action={primaryAction}` plus per-button `formAction={otherAction}`

        overrides. Decision value is hardcoded inside each action (not from user

        input) — Tampering surface is just the applicationId hidden input + the

        decisionNote textarea. Three separate inline server actions

        (acceptAction, waitlistAction, declineAction) each call a shared

        `decide(decision, formData)` helper. Each action re-checks auth()

        (defense-in-depth beyond layout gate) before invoking the helper.

        '
      file: src/app/admin/cohorts/applications/[id]/page.tsx
      reusable_for: any admin write-action form where N discrete decisions all share
        validation + invocation logic
    - id: drizzle_transaction_two_writes
      description: "First db.transaction() usage in fabled10x. Pattern:\n  await db.transaction(async\
        \ (tx) => {\n    await tx.insert(table_a).values(...).onConflictDoNothing({target:\
        \ ...});\n    await tx.update(table_b).set({...}).where(eq(table_b.id, id));\n\
        \  });\n  // post-tx side-effects (email) wrapped in try/swallow\nInsert +\
        \ update commit atomically. Side-effects (email) fire AFTER the\ncommit so\
        \ transaction lock doesn't span the HTTP call. Email failure\ndoes NOT roll\
        \ back DB rows — DB is canonical, email is best-effort\nand admin can re-trigger\
        \ from the detail page if needed.\n"
      file: src/lib/cohorts/admin.ts
      reusable_for: any future admin action that must atomically write to two related
        tables
    - id: drizzle_inner_join_admin_query
      description: "First .innerJoin() usage in fabled10x. Pattern:\n  db.select({\
        \ application: schema.cohortApplications, userEmail: schema.users.email })\n\
        \    .from(schema.cohortApplications)\n    .innerJoin(schema.users, eq(schema.cohortApplications.userId,\
        \ schema.users.id))\n    .where(...)\n    .orderBy(desc(schema.cohortApplications.submittedAt));\n\
        Caller maps each row to flatten the join shape:\n  rows.map(row => ({ ...row.application,\
        \ userEmail: row.userEmail }))\ninnerJoin automatically filters orphaned rows\
        \ (user deleted -> cohort\ncascade FK already removes the application row,\
        \ but join is the\nbelt-and-suspenders).\n"
      file: src/lib/cohorts/admin.ts
      reusable_for: any future admin query that needs to display user.email alongside
        their data
    - id: email_stub_signature_first_pattern
      description: "When ship order is helper-first / email-second (decideApplication\
        \ ships\nin 4.1, sendCohortDecision ships in 4.2), ship a STUB email module\
        \ in\nthe first section that exports the signature only:\n  export async function\
        \ sendCohortDecision(options: ...): Promise<void> {\n    void options;\n \
        \   return;\n  }\nTests for the consuming function (decideApplication) mock\
        \ the email\nimport so they don't exercise the stub body. Tests for the stub\
        \ itself\njust verify the export exists with the right signature. ce-4.2 fills\n\
        the implementation; signature stays stable.\n"
      file: src/lib/email/cohort-decision.ts
      reusable_for: any future split where the consumer ships before the dependency
  gotchas:
    - 'next-auth auth() return type does not need (await auth()) as { user?: ... }
      cast — Session type already has user.email. The cast was a Green-phase mistake
      that Refactor removed.'
    - 'Drizzle eq/and/desc are mocked in tests as `(col, val) => ({_op: ''eq'', col,
      val})` and assertions JSON.stringify the where arg to grep for the value. This
      avoids needing a real DB.'
    - vitest does NOT expose import.meta.url as a file:// URL — use path.join(process.cwd(),
      ...) for fs reads inside tests.
    - When spreading a fixture with `as const` enum and overriding the enum field,
      TS narrows the spread result to the original literal — drop the `as const` to
      `as string` on the fixture's decision field if you need to override in test
      setup.
  deferred_followups:
