build-log-overhaul-3.3:
  completed_at: '2026-06-09'
  patterns_established:
    - description: 'RecentActivity — bounded reverse-chronological feed RSC. entries.map(toEntry).reverse()
        then slice into 3 buckets: top-5 expanded ActivityCards (TOP_N_EXPANDED=5),
        6-25 compact mono rows (COMPACT_TAIL_CAP=25), 25+ inside a <details> "Show
        N older". Pure static RSC (no use client/hooks). Discriminated CompletedSectionEntry
        drives a kind===minimal early-return ("Shipped earlier (no detail recorded)")
        vs detailed card. resolveJobName uses rollup.find(r => id.startsWith(slug
        + "-")) — cheapest correct slug match since slugs contain hyphens.'
      file: src/components/build-log/RecentActivity.tsx
      reusable_for: Any bounded long-list feed where the long tail must not explode
        the DOM. The top-N-expanded / middle-compact / hidden-details bucketing is
        the brand pattern for "feels complete without overwhelming". 3.4 LiveWorktreesPanel
        + 4.1 page assembly consume the same completedSections data.
    - description: 'Notes-in-nested-<details> pattern: 40KB notes are NEVER auto-expanded
        — closed <details> with a 1000-char (NOTES_PREVIEW_CHARS) summary preview
        flattened via replace(/\s+/g, single-space) and an ellipsis when truncated.
        MarkdownDocument renders the full body only once opened. Nesting <details>
        inside the card works because the parent card is non-interactive.'
      file: src/components/build-log/RecentActivity.tsx
      reusable_for: Any oversize author-controlled prose (notes, transcripts) that
        should be collapsible-by-default to bound first-paint cost. 3.5 KnowledgeDigest
        renders patterns/deferred-followups the same way.
  gotchas:
    - 'SHIPS UNMOUNTED by design (Phase 3 preamble — same as Hero 3.1 / PipelineExplainer
      3.2). audit_component_mounts + all wiring beats marked N/A with plan citation,
      NOT failed: the five Phase-3 blocks ship as importable modules; Phase 4.1 page
      rewrite mounts them. Barrel-exported (RecentActivity + RecentActivityProps)
      now for that consumer. Same resolution applies to 3.4/3.5.'
    - toEntry() String()-coerces commit_hash because YAML parses all-digit short hashes
      as NUMBERS. A numeric commit_hash (e.g. 1234567) renders correctly via entry.commitHash.slice(0,7)
      only because of that coercion — tested explicitly (data_serialization_numeric_hash_coercion).
      When passing raw entries in tests, commit_hash is typed string | number on the
      inline-object shape.
    - Stat tiles render an em-dash (U+2014) for undefined tests/filesNew/filesModified
      — string-form (minimal) and field-less detailed entries degrade gracefully.
      Test asserts getAllByText(em-dash).toHaveLength(3) for a bare entry. Em-dash,
      not hyphen.
    - 'a11y verified WITHOUT jest-axe (the build-log suite has none) — semantic queries
      instead: section[aria-labelledby=recent-heading] -> h2#recent-heading, native
      <summary>/<details> for keyboard-operable disclosure, h2->h3 hierarchy with
      queryByRole(level 1)===null. <ul> counting (querySelectorAll("ul").length) cleanly
      distinguishes the 3 buckets: 1 ul = top only (<=5 entries), 2 = top+compact
      (6-25), 3 = +older details.'
  reusable_utilities:
    - function: 'resolveJobName(sectionId, rollup): string | null'
      file: src/components/build-log/RecentActivity.tsx
      purpose: startsWith(slug + "-") match of a section id to its JobRollupEntry
        title. Private to RecentActivity; promote to a shared build-log lib only if
        3.4/4.1 need the same id->job-title mapping (currently 1 site).
  deferred_followups:
    - 'cross-section DRY (carried from 3.1): mostRecentTimestamp (Hero) ~ inline most-recent-completedAt
