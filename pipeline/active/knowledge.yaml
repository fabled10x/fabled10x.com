build_log_overhaul_1_1:
  completed_at: '2026-06-08'
  patterns_established:
    - description: Branded-tuple + frozen-label-map + nullish-tolerant accessor
      file: src/lib/build-log/phase-labels.ts
      reusable_for: Any enum-shaped string union that needs (a) canonical ordering,
        (b) layperson-friendly labels, (c) safe accessor that tolerates unknown/null
        inputs. Mirrors src/content/schemas/content-tier.ts:1-17 pattern verbatim
        — `as const` tuple + `(typeof X)[number]` derived union + `Readonly<Record<X,
        string>>` wrapped in Object.freeze. Use this when you need both order AND
        mapping; if you need ordering only, the schemas/*.ts pattern is sufficient.
    - description: Forward-compatible label fallback (phaseLabel returns raw input
        for unknown phase names instead of throwing)
      file: src/lib/build-log/phase-labels.ts
      reusable_for: Any UI surface that renders strings from loose external state
        (session.yaml's current_agent, beats.yaml's stage names) where the pipeline
        might write a new value before the UI is updated. Prevents the build log from
        crashing if pipeline skills add a new phase name. Same precedent as toRoman
        returning '' for out-of-range (src/lib/format/roman.ts).
  gotchas:
    - TS strict-mode rejects `(PHASE_ORDER as readonly [...literals]).includes(arbitraryString)`
      — the literal-union element type doesn't accept `string`. The canonical fix
      is `(PHASE_ORDER as readonly string[]).includes(name)` — local cast scoped to
      the .includes() call. Documented design decision in interfaces.yaml#design_decisions.explicit_PHASE_ORDER_cast_inside_phaseLabel;
      matches planning doc spec phase-1-foundation.md:81,92 verbatim. Future tuple-membership
      checks across the codebase should use the same pattern, not invent a typeguard
      helper.
    - Object.freeze on PHASE_LABELS is intentional belt-and-suspenders on top of TS
      Readonly<>. TS Readonly<Record<K,V>> is compile-time only — a careless `delete
      PHASE_LABELS.preflight` in production code would silently mutate the singleton
      at runtime. Cheap on a 7-key object; locked by data_phase_labels_object_frozen
      test.
    - Test file uses readFileSync sentinel checks to assert the SOURCE file's shape
      (export names + barrel absence). This is the same pattern used by so-3.3 forbidden-patterns
      sentinel and the brand-barrel whitelist sentinels (Surfaces/BrushstrokeSeam/Logo/Section/Button
      .test.tsx). Cheap, deterministic, and locks structural decisions independent
      of TS narrowing.
  reusable_utilities:
    - function: phaseLabel(name)
      file: src/lib/build-log/phase-labels.ts
      purpose: Canonical lookup from pipeline phase name (preflight/discovery/red/green/refactor/finish/release)
        to layperson copy. Returns raw input for unknown phase names, '' for null/undefined/empty.
        Consumers in 1.3 (derive-live-status), 2.1 (PhaseStepper), 3.1 (Hero), 3.2
        (PipelineExplainer), 3.4 (LiveWorktreesPanel).
    - function: isPhaseName(value)
      file: src/lib/build-log/phase-labels.ts
      purpose: Type guard narrowing string|null|undefined to PhaseName. Use in deriveLiveStatus's
        'paused' check (1.3) and anywhere the loose session.yaml current_agent string
        needs to be narrowed before reaching for PHASE_LABELS.
    - constant: PHASE_ORDER
      file: src/lib/build-log/phase-labels.ts
      purpose: Canonical left-to-right ordering of the 7 TDD phases for the stepper
        UI (preflight → discovery → red → green → refactor → finish → release). Iterate
        this tuple in PhaseStepper (2.1) and PipelineExplainer (3.2) instead of duplicating
        the list.
  deferred_followups:
    - If build-log-overhaul-1.3/2.1/3.1/3.2/3.4 all land and import from @/lib/build-log/phase-labels,
      re-evaluate whether src/lib/build-log/index.ts barrel makes sense. Current planning
      doc design decision §1 says no; 5+ consumers may flip that judgement.
    - If a future section adds a new pipeline phase, update PHASE_ORDER + PHASE_LABELS
      together (the unit_order_label_keys_match test enforces this). The fallback
      in phaseLabel means the build log won't crash if you forget, but the new phase
      will render its raw name instead of the friendly label.
