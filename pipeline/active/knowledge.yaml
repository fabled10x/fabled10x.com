cohort-enrollment-1.2:
  completed_at: "2026-04-13"
  patterns_established:
    - id: cohort_loader_mirrors_products_with_startdate_asc
      file: "src/lib/content/cohorts.ts"
      description: |
        Fourth fabled10x content loader, structurally identical to products.ts
        (ReadonlyArray<LoadedEntry<T>> + Object.freeze + manifest pattern) with
        two intentional divergences:
          (1) Sort by `meta.startDate` ASCENDING (not `meta.publishedAt`
              DESCENDING). Rationale (planning-doc line 506-508): UX signal for
              the /cohorts catalog is "when is the next cohort I can join",
              not "when was it published". Publication date is immaterial
              to an applicant.
          (2) Adds `getCohortBuckets()` partition helper that splits the cache
              into `upcoming: [announced|open|closed]` + `archived: [enrolled|
              shipped]`. Status `closed` goes to UPCOMING (applications closed
              but cohort has not run yet), NOT archived. Canonicalizes the
              bucket classification so ce-1.3 index page + ce-4.5 account page
              stay in sync.
      reusable_for: "ce-1.3 index + detail pages consume all three functions; ce-4.5 account page consumes getCohortBuckets"

    - id: cohort_seed_mdx_status_pairing
