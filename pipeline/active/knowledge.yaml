storefront-auth-2.2:
  completed_at: '2026-04-13'
  patterns_established:
    - id: next_auth_v5_module_augmentation_pattern
      description: "To add custom fields to next-auth v5's Session type (e.g., session.user.id\n\
        which next-auth defaults to omit), use ambient module augmentation in\n`src/types/next-auth.d.ts`:\n\
        \  import 'next-auth';\n  declare module 'next-auth' {\n    interface Session\
        \ { user: { id: string; email: string; ... }; expires: string; }\n  }\ntsconfig.json's\
        \ default `include: ['**/*.ts']` picks this up automatically.\nNo separate\
        \ triple-slash reference needed.\n"
      file: src/types/next-auth.d.ts
      reusable_for: Any future section that adds custom Session fields (e.g., role/tenant
        for multi-role auth, impersonation tokens, feature flags)
    - id: auth_config_extract_pattern
      description: "Extract NextAuth() config object as named export `authConfig`\
        \ BEFORE\ndestructuring { handlers, auth, signIn, signOut }. This exposes\n\
        adapter, providers, callbacks to integration tests that need to\nexercise\
        \ the adapter directly (e.g., `authConfig.adapter.createUser(...)`).\nAlso\
        \ extract `sessionCallback` as a separate named export so it can\nbe unit-tested\
        \ in isolation without going through NextAuth's wrapper.\nPattern:\n  export\
        \ const sessionCallback: NonNullable<NonNullable<NextAuthConfig['callbacks']>['session']>\
        \ = async ({ session, user }) => { ... };\n  export const authConfig: NextAuthConfig\
        \ = { adapter, providers, ..., callbacks: { session: sessionCallback } };\n\
        \  export const { handlers, auth, signIn, signOut } = NextAuth(authConfig);\n"
      file: src/auth.ts
      reusable_for: Any future refactor of auth.ts (e.g., adding JWT callback, adding
        signIn callback, swapping adapters)
    - id: vitest_next_auth_deps_inline
      description: 'next-auth@5.x (beta) does `import ''next/server''` internally
        (bare

        import without .js extension). vitest''s default Node ESM resolver

        fails with "Cannot find module ''next/server''. Did you mean

        ''next/server.js''?". Fix: add next-auth to vitest config''s

        test.server.deps.inline array so Vite processes next-auth''s

        imports and resolves via next.js''s package.json exports field.

        REQUIRED inline packages: [''next-auth'', ''@auth/core'', ''@auth/drizzle-adapter''].

        @auth/core is transitively imported by next-auth and has similar

        bare imports; @auth/drizzle-adapter imports @auth/core''s Adapter type.

        '
      file: vitest.config.mts
      reusable_for: Any future section adding another next-auth adapter, provider,
        or Auth.js satellite package
    - id: vi_hoisted_db_url_stub_for_module_load
      description: "sa-2.1 shipped src/db/client.ts with `throw new Error('DATABASE_URL\
        \ is\nnot set')` at module scope. Any test file that imports `@/auth`\ntransitively\
        \ imports `@/db/client` and fails to load without\nDATABASE_URL — even when\
        \ the tests are supposed to be DB-gated via\nskipIf(!hasDb). Fix: per-file\
        \ `vi.hoisted(() => { ... })` block at\nthe top of the test file sets DATABASE_URL\
        \ (+ AUTH_SECRET + RESEND_API_KEY)\nto recognizable stub values before imports\
        \ execute. vi.hoisted's\nblock runs before ALL imports (even hoisted-up import\
        \ statements).\nThen the file's hasDb check is TIGHTENED to exclude the stub\
        \ marker:\n  const hasDb = typeof DATABASE_URL === 'string' && .length > 0\
        \ && !DATABASE_URL.includes('stubhost');\nResult: real DATABASE_URL triggers\
        \ integration tests; stub allows\nmodule load without running DB-gated tests.\n"
      file: src/__tests__/auth.test.ts, src/app/api/auth/[...nextauth]/__tests__/route.test.ts
      reusable_for: Any future section in sa-3.x/4.x that imports @/auth in test context
        (3.1 Stripe checkout action, 3.2 webhook handler, 4.1 account page)
    - id: drizzle_adapter_schema_contract
      description: '@auth/drizzle-adapter v1.11''s DrizzleAdapter(db, schema?) requires

        schema to be a DefaultPostgresSchema with usersTable matching

        {id, name, email, emailVerified, image} columns and an accountsTable

        (even for magic-link only — TS type contract is strict). Magic-link

        never queries the accounts table at runtime, but the schema object

        must include it for TS. Our sa-2.1 users table only had

        {id, email, createdAt, lastSignInAt} — not adapter-compatible until

        extended with (emailVerified, name, image) nullable columns + a new

        accounts table matching Auth.js defaults (userId FK cascade,

        composite PK on provider+providerAccountId, 11 OAuth-specific columns).

        Migration 0001 generated via drizzle-kit with explicit --name flag.

        '
      file: src/db/schema.ts + src/db/migrations/0001_add_auth_user_columns_and_accounts.sql
      reusable_for: Any future adapter integration (e.g., adding OAuth providers in
        a later job — accounts table already in place)
    - id: msw_server_bootstrap_pattern
      description: "Minimal MSW server file at src/__tests__/mocks/msw-server.ts:\n\
        \  export const server = setupServer(...defaultResendHandlers);\nWith default-export'd\
        \ handler array so individual tests can reference\nit for re-extension. setup.ts\
        \ imports `server` and wires lifecycle:\n  beforeAll(() => server.listen({\
        \ onUnhandledRequest: 'bypass' }));\n  afterEach(() => cleanup());\n  afterEach(()\
        \ => server.resetHandlers());  // separate hook for regex-friendly detection\n\
        \  afterAll(() => server.close());\n'bypass' (not 'error') because unrelated\
        \ test fetches shouldn't fail\nhard — only assertions about specific intercepted\
        \ endpoints matter.\n"
      file: src/__tests__/mocks/msw-server.ts + src/__tests__/setup.ts
      reusable_for: Any section needing HTTP intercepts in tests (sa-3.1 Stripe, sa-3.2
        webhook signature, 4.2 sitemap external fetches)
  gotchas:
    - id: drizzle_adapter_users_schema_mismatch_breaking
      description: 'sa-2.1 users schema was authored without knowledge that @auth/drizzle-adapter

        v1 REQUIRES emailVerified/name/image columns. Attempting to use the

        adapter against sa-2.1''s users table (without extension) would fail at

        INSERT time with "column ''emailVerified'' of relation ''users'' does not

        exist". TypeScript also rejects the adapter config. Always verify

        adapter''s DefaultPostgresSchema type shape against your actual table

        before wiring.

        '
    - id: nextauth_signin_server_action_context
      description: 'Auth.js v5 exports signIn as a SERVER ACTION — when imported from
        a

        client component, Next.js requires an implicit "use server" directive.

        Auth.js''s own src/auth.ts is auto-marked. For tests, calling signIn()

        directly works in Vitest''s node environment (no Next.js request context

        needed for the pure provider flow). The hidden callbackUrl input in

        SignInForm (sa-2.3) is required so the server action receives it

        through formData.

        '
    - id: drizzle_kit_requires_name_flag_for_stable_migration_names
      description: 'Re-confirming sa-2.1''s gotcha: `drizzle-kit generate` without
        --name

        produces migrations with random descriptive names. Use

        `npm run db:generate -- --name descriptive_change` to get stable

        0001_descriptive_change.sql filename. Used for 0001_add_auth_user_columns_and_accounts.sql.

        '
    - id: drizzle_schema_test_literal_must_include_all_non_optional_fields
      description: 'Drizzle''s $inferSelect type includes EVERY column as either T
        or T|null

        (not optional with ?). When schema is extended with new columns, existing

        tests that construct a User literal via `const u: User = { ... }` must

        be updated to include the new fields (as null if nullable). This is a

        cross-section ripple: sa-2.1''s schema.test.ts line 16-24 needed

        emailVerified/name/image added when sa-2.2 extended the users schema.

        '
  reusable_utilities:
    - function: authConfig
      file: src/auth.ts
      purpose: Full NextAuthConfig object exposed for integration tests that need
        adapter/providers/callbacks access directly (e.g., sa-3.1/3.2/4.1 may need
        to invoke adapter methods under test)
    - function: sessionCallback
      file: src/auth.ts
      purpose: Extracted session() callback — unit-testable in isolation. Mirrors
        user.id into session.user.id. Any future changes to session payload shape
        go here.
    - function: server (MSW setupServer instance)
      file: src/__tests__/mocks/msw-server.ts
      purpose: Shared MSW server for the whole test suite. Append handlers in individual
        tests via `server.use(http.post(url, handler))`. Resets between tests via
        setup.ts afterEach.
  cross_section_cleanup_opportunities_added:
    - opportunity: Extract truncateAll helper + hasDb gate to src/db/__tests__/_helpers.ts
      rationale: Now duplicated in 2 files (schema.test.ts, auth.test.ts). When sa-3.2
        (webhook) or 3.3 (download) adds a 3rd integration-DB file, do the extraction.
        Matches sa-2.1's earlier signal.
      next_section_trigger: sa-3.2 or sa-3.3
  inherited_open_question_status:
    - id: loader_build_incompat
      severity: P1
      status: CONFIRMED RESOLVED (still) — not re-tested in sa-2.2 (VPS OOM skips
        npm run build per policy). sa-2.1 + ce-1.2 both confirmed. Downgrade to resolved
        tracked separately.
      next_action: No action required — still resolved
  section_notes: "Second consecutive section to skip local npm run build verification\
    \ due\nto VPS OOM policy. The loader_build_incompat P1 remains observationally\n\
    resolved from sa-2.1/ce-1.2; this section doesn't touch loaders so no\nnew risk\
    \ introduced.\n\nSection is infrastructure-heavy config work — small code surface\n\
    (4 new source files + 1 migration + 2 test files) with high precision\nrequired.\
    \ All 3 discovery-flagged P1 risks (adapter shape, next-auth\nbeta drift, Resend\
    \ endpoint URL) resolved during green phase:\n- Adapter shape: required users\
    \ schema extension + accounts table addition\n- next-auth beta drift: API aligned\
    \ with v5.0.0-beta.30; next/server\n  import in env.js requires vitest deps.inline\
    \ fix\n- Resend endpoint URL: confirmed https://api.resend.com/emails — MSW\n\
    \  handler in place\n\nConcurrent ce-1.2 landed in tree (src/content/schemas/cohort.ts\
    \ +\nsrc/lib/content/cohorts.ts + tests) during this run; sa-2.2 commit\nexplicitly\
    \ stages only sa-2.2 files per the established pattern.\n\nBlocker cleared: sa-2.3\
    \ (middleware + /login pages + SignInForm) is the\nnatural next section. Middleware\
    \ tests won't need DB harness (pure\nfunction tests). SignInForm will consume\
    \ `signIn` from @/auth via\n'use client' component — first client-side auth surface.\n"
storefront-auth-2.3:
  completed_at: '2026-04-13'
  name: Edge proxy + Login pages + SignInForm
  tests: 39
  files_new: 9
  files_modified: 0
  commit_hash: pending
  patterns_established:
    - id: next16_proxy_convention
      description: 'Next.js 16 deprecated the `middleware.ts` file convention and
        renamed

        it to `proxy.ts`. The function must be named `proxy` (default or

        named export). Config object with `matcher` is unchanged. All future

        edge-gating work in this repo uses proxy.ts, NOT middleware.ts.

        '
      file: proxy.ts (project root)
      reference_docs: node_modules/next/dist/docs/01-app/03-api-reference/03-file-conventions/proxy.md
      reusable_for: Any future edge-runtime gating, header modification, A/B routing
    - id: edge_proxy_cookie_filter_pattern
      description: 'For session-based gating without a DB call, read cookie presence

        only (Boolean of .value). This is a FILTER, not authentication — the

        downstream page handler / route handler must re-validate via auth()

        for real authorization. Two-layer design keeps the edge fast and

        Node-only packages out of the Edge runtime.

        '
      file: proxy.ts
      reusable_for: Future gated route families (admin, portal, etc.)
    - id: auth_form_use_action_state
      description: 'Client-side `useActionState` wrapped around an inline async action

        (NOT a separate ''use server'' module) works for forms that call an

        existing Auth.js or similarly-provided server action. The action

        lives inside the ''use client'' component, validates input, then

        awaits the external server action. Pending state auto-disables the

        submit button; error state renders p[role=alert] for screen readers.

        Mirrors wf-4.1 EmailCapture but with inline action (EmailCapture

        uses a separate actions.ts).

        '
      file: src/components/auth/SignInForm.tsx
      reusable_for: Any passwordless / magic-link / social auth form
    - id: nextrequest_test_fabrication
      description: 'Test edge-runtime proxy/middleware by fabricating NextRequest
        objects:

        `const req = new NextRequest(new URL(path, ''http://localhost:3000''));`

        Cookies: `req.cookies.set(name, value);`. Assert redirect via

        `res.status === 307` and `res.headers.get(''location'')`. Assert

        passthrough via `res.status === 200` or

        `res.headers.get(''x-middleware-next'') === ''1''`.

        '
      file: src/__tests__/proxy.test.ts
      reusable_for: All future proxy tests
  gotchas:
    - id: import_meta_url_not_file_in_jsdom
      description: 'Vitest''s jsdom environment does NOT set `import.meta.url` to
        a

        `file://` scheme URL. Using `new URL(''../foo'', import.meta.url)`

        with `fs.readFileSync` throws "The URL must be of scheme file".

        Fix: use `path.resolve(process.cwd(), ''foo'')` instead.

        '
      encountered_in: src/__tests__/proxy.test.ts infra_middleware_edge_runtime_safe
      reusable_for: Any test that needs to read source files from disk
    - id: react19_html5_validation_blocks_action
      description: 'In React 19 + jsdom, HTML5 constraint validation on type="email"

        inputs blocks form submission when the value is non-empty but

        invalid (e.g., ''nope''). The form''s submit event never fires, so

        React''s form action handler never runs. Workarounds that imperatively

        `setAttribute(''type'', ''text'')` or `removeAttribute(''required'')` get

        reconciled away by React between user.type and user.click. Fix:

        use `fireEvent.submit(form)` instead of `user.click(button)` —

        bypasses browser validation and triggers React''s action handler

        directly. Preserves test intent.

        '
      encountered_in: src/components/auth/__tests__/SignInForm.test.tsx
      reusable_for: Any client-component form test that validates invalid values against
        server-side rules (not relying on HTML5)
    - id: vi_mock_auth_for_ui_tests
      description: 'Any UI test that renders a component importing from `@/auth`

        (directly or transitively) will fail with "DATABASE_URL is not set"

        unless it mocks `@/auth`. The @/auth module imports db from

        @/db/client which throws if the env var is unset. For pure UI

        tests not exercising real auth flows, add at top of test file:

        `vi.mock(''@/auth'', () => ({ signIn: vi.fn(async () => undefined) }));`

        '
      encountered_in: src/app/login/__tests__/page.test.tsx
      reusable_for: All future tests rendering components that transitively import
        @/auth
  reusable_utilities:
    - name: hasSessionCookie(request)
      file: proxy.ts
      purpose: Returns true if either `authjs.session-token` or `__Secure-authjs.session-token`
        cookie is present with truthy value. Encapsulates the dev/production cookie-name
        difference.
  decisions:
    - topic: proxy.ts vs middleware.ts
      chose: proxy.ts
      rationale: Next.js 16 deprecated middleware.ts per docs; AGENTS.md directs 'heed
        deprecation notices'. The planning doc at currentwork/storefront-auth/phase-2-auth-persistence.md
        was written before the rename and references middleware.ts — should be updated
        if revised. Implementation, tests, and integration test all use proxy.ts.
    - topic: Inline signInAction vs separate actions.ts
      chose: inline in SignInForm.tsx (per planning doc)
      rationale: The action only wraps Auth.js's signIn — no validation logic complex
        enough to warrant extraction. Simpler to keep in one file. Differs from wf-4.1
        EmailCapture (which has separate actions.ts with 'use server') because signIn
        IS already a server action; re-wrapping in a 'use server' module would double-serialize.
  next_section_handoff: "With sa-2.3 shipped, Phase 2 (auth persistence) is complete.\
    \ Session\nmanagement is wired edge→page→action. Phase 3 (downloads + cart) can\n\
    assume:\n- Anonymous requests to /products/account/* and /api/products/downloads/*\n\
    \  are redirected to /login with callbackUrl preserved.\n- Authenticated sessions\
    \ have a cookie that proxy recognizes (but Phase 3\n  handlers must re-validate\
    \ via auth() — proxy is filter-only).\n- /login/verify renders after a magic-link\
    \ submit; the magic-link itself\n  is delivered by Resend and handled by Auth.js's\
    \ /api/auth/[...nextauth]\n  route (from sa-2.2).\n"
storefront-auth-3.1:
  completed_at: '2026-04-14'
  patterns_established:
    - description: stripe_singleton_client
      file: src/lib/stripe/client.ts
      reusable_for: Any future Stripe SDK usage — singleton with API version pin and
