    - "stripePriceId regex /^price_[A-Za-z0-9]+$/ does NOT allow underscores in the suffix. Initial seed used 'price_REPLACE_ME_BEFORE_SHIPPING' which failed validation; corrected to 'price_REPLACEMEBEFORESHIPPING'. Real Stripe price IDs (e.g., 'price_1ABCxyz0123456789') match the regex; the placeholder also matches. Validator-acceptable + Stripe-rejectable is the intentional friction (Stripe 400s at Checkout if the placeholder reaches them)."
    - "The bpd-1.2 mapCompletedEntry helper expects either string-form OR object-form completedSections entries with `section:`/`completedAt:` keys. session.yaml uses `id:`/`completed_at:` keys (the project convention) — this divergence is handled at the loader boundary by mapCompletedEntry (already implemented in pipeline-state.ts). storefront-auth-1.1's completed_section entry follows the existing project convention; do not switch to schema convention."

