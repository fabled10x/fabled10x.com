        MDX input (''USD''/''usd''/''Usd''), normalizes to lowercase per Stripe API.

        (2) Anti-traversal regex on assetFilename: `/^[a-zA-Z0-9._-]+$/` with

        custom error message ''filename must not contain path separators'' —

        defense-in-depth at content-load time (Phase 3.3 download handler

        ALSO validates with path.resolve, but the validator catches at

