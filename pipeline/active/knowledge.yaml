knowledge:
  version: 1
  project: fabled10x
  description: 'Cross-section knowledge store. Skills read/write here when a pattern,

    constraint, or decision applies to multiple sections. Keeps context

    portable between pipeline runs.

    '
project_context:
  purpose: 'fabled10x is the brand/marketing site for the Fabled10X YouTube channel

    and social media presence. Primary outputs: episode index, project case

    studies, free interactive tools, storefront. Secondary job: promote the

    sister project, The Large Language Library (largelanguagelibrary.ai),

    which hosts the public AI-optimized knowledge base. The KB lives there,

    not here.

    '
  stack:
    framework: Next.js 16.2.3 (App Router)
    runtime: React 19.2.4
    styling: Tailwind CSS 4
    testing: Vitest + Testing Library + MSW
    persistence: static (MDX / content files)
    deployment: TBD
  content_model:
    location: src/content/schemas/
    types:
      - ContentTier (flagship | playbook | shorts | livestream | community)
      - ContentPillar (delivery | workflow | business | future)
      - Episode (links to source materials and external LLL entry URLs)
      - SourceMaterial (build artifact shown as episode show notes)
conventions:
  test_files: src/**/__tests__/**/*.test.{ts,tsx}
  test_setup: src/__tests__/setup.ts
  path_alias: '@/ → src/'
  mocks: src/__tests__/mocks/
patterns:
  - id: content_type_module
    established_in: website-foundation-1.1
    established_at: '2026-04-11'
    description: 'One content type per file under src/content/schemas/{name}.ts with

      four-part structure: `const X_VALUES = [...] as const` tuple, derived

      union type `(typeof X_VALUES)[number]`, sibling `Record<Union, string>`

      label/metadata map, and the record interface. Barrel re-exports from

      src/content/schemas/index.ts. Colocated tests at

      src/content/schemas/__tests__/{name}.test.ts.

      '
    reusable_for:
      - Any future content type that has enumerated statuses or kinds
      - Sibling sections website-foundation-1.2 (Zod validators — imports the const
        tuples as schema sources)
      - Later sections that load and render Case records (3.4, 3.5)
    examples:
      - src/content/schemas/case.ts
      - src/content/schemas/content-tier.ts
      - src/content/schemas/source-material.ts
  - id: brand_token_system
    established_in: website-foundation-1.3
    established_at: '2026-04-11'
    description: 'Brand tokens defined in src/app/globals.css using Tailwind 4 @theme

      inline blocks. Six named brand colors (ink, parchment, ember, steel,

      mist, signal) with five semantic aliases (background, foreground,

      muted, accent, link). Dark mode overrides via nested @media

      (prefers-color-scheme: dark) { @theme inline { ... } }. Downstream

      components reference tokens via Tailwind utility classes (bg-background,

      text-foreground, text-muted, text-accent, text-link, border-mist, etc.)

      — no raw hex values in component files.

      '
    reusable_for:
      - Section 1.4 (site shell) — Header, Footer, Container use brand colors via
        Tailwind classes
      - All Phase 3 pages — brand tokens establish the visual system
      - Section 4.1 (email capture) — form styling uses brand accent/link colors
  - id: css_token_testing
    established_in: website-foundation-1.3
    established_at: '2026-04-11'
    description: "CSS custom properties cannot be tested via jsdom getComputedStyle\n\
      (no real CSS engine). Tests read the CSS file with fs.readFileSync\nand assert\
      \ on string content (toContain). This pattern lives in\nsrc/app/__tests__/globals-css.test.ts.\
      \ Layout metadata is tested by\nimporting the exported metadata object directly\
      \ from layout.tsx.\nnext/font/google must be mocked in Vitest (Geist is not\
      \ a function\nerror without the mock). Mock pattern:\nvi.mock('next/font/google',\
      \ () => ({\n  Geist: () => ({ variable: '--font-geist-sans', className: 'geist-sans'\
      \ }),\n  Geist_Mono: () => ({ variable: '--font-geist-mono', className: 'geist-mono'\
      \ }),\n}));\n"
    reusable_for:
      - Any future test that imports from layout.tsx needs the same next/font/google
        mock
      - Section 1.4 tests that render components using brand tokens
  - id: validator_module
    established_in: website-foundation-1.2
    established_at: '2026-04-11'
    description: 'Zod validators live in a SEPARATE file (validators.ts) from the
      TS

      interfaces so type-only consumers don''t pull runtime zod. Schemas

      import CONST tuples from sibling schema files (CONTENT_TIERS, etc.)

      via z.enum(TUPLE). Export Input helper types via z.input<typeof Schema>.

      Re-exported from barrel (src/content/schemas/index.ts).

      '
    reusable_for:
      - Any future content type that needs runtime validation at the content boundary
      - Section 2.2 (content loader) — will call .parse() on these schemas
  - id: site_shell_components
    established_in: website-foundation-1.4
    established_at: '2026-04-11'
    description: 'Site shell components live in src/components/site/ with barrel export

      from index.ts. Container is a polymorphic width-constraint primitive

      (accepts as prop: div|section|main|article). Header and Footer are

      composed from Container. All components use brand tokens via Tailwind

      utility classes — no raw hex values. NAV_ITEMS is a local constant

      in Header.tsx (Episodes, Cases, About). Layout wraps children in

      <Header /><main className="flex-1">{children}</main><Footer />.

      '
    reusable_for:
      - Phase 3 pages — all render inside this shell automatically
      - Future nav items — add to NAV_ITEMS array in Header.tsx
      - Container reuse — any page section that needs width constraint
  - id: next_link_test_mock
    established_in: website-foundation-1.4
    established_at: '2026-04-11'
    description: "next/link must be mocked in Vitest jsdom tests. Mock pattern:\n\
      vi.mock('next/link', () => ({\n  default: ({ children, href }: { children: React.ReactNode;\
      \ href: string }) => (\n    <a href={href}>{children}</a>\n  ),\n}));\nUses\
      \ typed props (not any) to satisfy ESLint no-explicit-any rule.\n"
    reusable_for:
      - Any future component test that renders next/link
  - id: nextjs_16_error_boundary
    established_in: website-foundation-1.4
    established_at: '2026-04-11'
    description: 'Next.js 16.2.0+ uses unstable_retry as the primary error boundary

      prop (added in v16.2.0). reset() still exists but is secondary.

      error.tsx must have ''use client'' directive. Props:

      { error: Error & { digest?: string }; unstable_retry: () => void }

      Tested by passing mock error and mock retry function as props.

      '
    reusable_for:
      - Per-segment error boundaries in Phase 3
  - id: mdx_content_loader
    established_in: website-foundation-2.1
    established_at: '2026-04-12'
    description: 'Generic content loader in src/lib/content/loader.ts. loadContent<T>()

      discovers .mdx files via readdir, dynamically imports each, validates

      the named `meta` export against a Zod schema, returns {meta, slug,

      Component}[]. Validation errors throw with file path + Zod message for

      build-time failure. Accepts injectable readdirFn and importFn for

      testability (node:fs/promises mocking unreliable in vitest ESM).

      '
    reusable_for:
      - Any future content type needing filesystem-based MDX loading
      - Section 2.2 (seed content) — provides the files that loader discovers
      - Phase 3 pages — consume getAllEpisodes/getCaseBySlug accessors
  - id: module_level_cache
    established_in: website-foundation-2.1
    established_at: '2026-04-12'
    description: 'episodes.ts and cases.ts use module-level cache variables

      (let cache = null) with a loadAll() guard. Safe because content is

      immutable within a build. Pattern: declare cache at module scope,

      populate on first call, return cached value on subsequent calls.

      '
    reusable_for:
      - Any future content loader that reads static files
  - id: test_seam_injection
    established_in: website-foundation-2.1
    established_at: '2026-04-12'
    description: 'When vitest ESM mocking of Node.js built-in modules (node:fs/promises)

      is unreliable, use injectable function parameters as test seams.

      loader.ts accepts readdirFn and importFn. Production callers omit

      these (defaults to real readdir/import). Tests inject mocks directly.

      '
    reusable_for:
      - 'Any future module that needs to mock node: built-in modules'
  - id: async_server_component_testing
    established_in: website-foundation-3.1
    established_at: '2026-04-12'
    description: "Async server components (async function Page()) can be tested in\n\
      Vitest jsdom by calling the function, awaiting the JSX, and passing\nit to render().\
      \ Pattern:\n  async function renderPage() {\n    const jsx = await Page();\n\
      \    return render(jsx);\n  }\nMock async data fetchers via vi.mock + mockResolvedValue.\
      \ This\navoids Suspense complexity in test environments.\n"
    reusable_for:
      - All Phase 3 pages (episodes, cases, about) that use async data loading
      - Any future async server component
  - id: forward_dependency_stub
    established_in: website-foundation-3.1
    established_at: '2026-04-12'
    description: 'When a section imports a component from a future section, create
      a

      minimal stub satisfying the import and type signature. Stub should

      be as simple as possible. Example: EmailCapture stub in Phase 3

      is a form shell at src/components/capture/EmailCapture.tsx with

      props { source: string }. Phase 4.1 replaces the stub with the

      real implementation. In parent tests, mock the stub component to

      isolate the parent from the stub implementation.

      '
    reusable_for:
      - Phase 3 pages importing EmailCapture and LllCrosslinks from Phase 4
  - id: loaded_entry_field_access
    established_in: website-foundation-3.1
    established_at: '2026-04-12'
    description: 'LoadedEntry<T> (from src/lib/content/loader.ts) has shape

      { meta: T, slug: string, Component: ComponentType }. Access typed

      fields via .meta.fieldName, not .fieldName directly. The planning

      docs may show shorthand (e.g., entry.title) that doesn''t match

      the actual type — always use entry.meta.title.

      '
    reusable_for:
      - All pages consuming content loaders (episodes, cases)
  - id: content_page_pattern
    established_in: website-foundation-3.2
    established_at: '2026-04-12'
    confirmed_reused_in:
      - website-foundation-3.3
    description: 'Content index + detail page pair pattern:

      Index: async server component, getAllX(), 2-col grid of Link cards

      with metadata badges. Exports static metadata object.

      Detail: async server component, getXBySlug(slug), dynamicParams=false,

      generateStaticParams, generateMetadata with Promise<{slug}> params

      (Next.js 16 async params). notFound() + return guard for missing entries.

      <Component /> renders MDX body. Conditional sections for optional fields.

      EmailCapture at bottom with source=''type-{slug}''.

      '
    reusable_for:
      - 'Section 3.3 (cases index + detail) — CONFIRMED reused: identical pattern
        with CaseStatus badges'
      - Any future content type with index + detail routes
  - id: cross_loader_related_entity_resolution
    established_in: website-foundation-3.3
    established_at: '2026-04-12'
    description: 'Detail pages that reference other content types resolve related
      entries

      by calling the peer loader and filtering locally. Example:

      case detail calls getAllEpisodes() and filters where

      relatedEpisodeIds.includes(ep.meta.id). Module-level cache (from 2.1)

      makes repeated calls O(1) after first load, so unconditional peer-loader

      calls are fine. Conditionally render the "Related X" section only when

      the filtered result is non-empty.

      '
    reusable_for:
      - Any future detail page needing to resolve cross-type references (e.g., episode
        → related cases in a later polish pass)
      - Any future 'related content' surface that shouldn't persist a join table but
        can filter in-memory
  - id: notfound_return_guard
    established_in: website-foundation-3.2
    established_at: '2026-04-12'
    description: "In Next.js 16 async server components, notFound() throws in production\n\
      but test mocks are no-ops. Add explicit return after notFound() to\nprevent\
      \ test code from executing past the guard:\n  if (!entry) { notFound(); return;\
      \ }\nThis avoids the entry! non-null assertion and lets TypeScript narrow\n\
      correctly after the guard.\n"
    reusable_for:
      - Section 3.3 (cases detail page) — same notFound pattern
      - Any future detail page with getXBySlug
  - id: static_prose_page
    established_in: website-foundation-3.4
    established_at: '2026-04-12'
    description: 'Pattern for single-route static prose pages (about, terms, privacy,
      brand):

      synchronous RSC (no `async`), no content loader, no forward-reference

      stubs. Container with `as="article" className="py-16 max-w-3xl"` for

      reading-width override of Container''s base max-w-5xl. Static `metadata`

      export (not generateMetadata). Test file uses render(<Page />) directly

      — do NOT use the async_server_component_testing helper. next_link_test_mock

      still applies even if only outbound links are external absolute URLs.

      '
    reusable_for:
      - 'Future static pages: /terms, /privacy, /press, /brand, /contact (if static)'
      - Any single-route page that has no data dependencies
    confirmed_reused_in: []
  - id: server_action_with_degraded_env
    established_in: website-foundation-4.1
    established_at: '2026-04-12'
    description: "Server actions that call external SDKs should read env vars INSIDE\
      \ the\naction body (not at module scope) so tests can mutate process.env via\n\
      beforeEach/afterEach. Validate input with Zod safeParse first (reject\nbad input\
      \ before touching the SDK). If required env vars are missing,\nlog via console.error\
      \ and return a user-friendly degraded error state\n— do not crash on import.\
      \ Wrap SDK calls in try/catch that returns the\nsame discriminated error state.\
      \ NEVER log the raw SDK error object —\nSDK error messages may contain the api\
      \ key. Use `catch {}` (parameterless)\nwhen you need to swallow the error for\
      \ security.\n\nDiscriminated return type pattern:\n  type ActionState =\n  \
      \  | { status: 'idle' }\n    | { status: 'success' }\n    | { status: 'error';\
      \ message: string };\n\nExample: src/components/capture/actions.ts\n"
    reusable_for:
      - Future free-tools or storefront actions that call Stripe, Postmark, etc.
      - Any server action consumed by useActionState
  - id: useactionstate_form_pattern
    established_in: website-foundation-4.1
    established_at: '2026-04-12'
    description: 'Client forms that post to a server action should use React 19''s

      useActionState(action, initialState) returning [state, formAction, isPending].

      <form action={formAction}> wires submission. Success state replaces the

      form entirely (a subscribed user shouldn''t re-see the form). Error state

      renders message below form but keeps form mounted. Submit button uses

      disabled={isPending} with label swap (''Sending…'' / original label).

      sr-only label with htmlFor={unique-id} for a11y. source context passed

      via <input type="hidden" name="source" value={...}> (keeps action

      signature standard FormData-only).


      Testing: mock the action module with vi.mock(''../actions'', ...) and

      stub with a vi.fn that returns a Promise. userEvent.type + userEvent.click

      + waitFor for the success/error transition. For double-submit testing,

      use a Promise that doesn''t resolve until the test resolves it manually.


      Mock resend SDK: vi.mock(''resend'', () => ({ Resend: vi.fn(() => ({ contacts:
      { create: mockCreate } })) }))

      '
    reusable_for:
      - Any future form posting to a server action (cohort enrollment, storefront
        checkout, testimonials submit)
  - id: jsonld_inline_in_detail_page
    established_in: website-foundation-4.1
    established_at: '2026-04-12'
    description: "For per-entry structured data, build a JSON-LD object inline in\
      \ the\ndetail page render function and emit as:\n  <script type=\"application/ld+json\"\
      \n    dangerouslySetInnerHTML={{ __html: JSON.stringify(jsonLd) }} />\nPlace\
      \ at the TOP of the returned JSX, before the main content. This is\nthe canonical\
      \ Next.js 16 pattern. Use schema.org @type that best fits:\nVideoObject for\
      \ episodes (datePublished + contentUrl + thumbnailUrl),\nCreativeWork for cases\
      \ (creator Organization + about client).\n\nTesting: container.querySelector('script[type=\"\
      application/ld+json\"]'),\nthen JSON.parse(script.innerHTML). Assert on parsed\
      \ fields.\n"
    reusable_for:
      - Any future detail page (tools, testimonials, storefront products) that needs
        structured data
  - id: dynamic_sitemap_from_loaders
    established_in: website-foundation-4.1
    established_at: '2026-04-12'
    description: 'Next.js 16 sitemap convention: export async function default from

      src/app/sitemap.ts returning MetadataRoute.Sitemap. Call content loaders

      with Promise.all for parallel fetching. Guard optional dates with

      conditional spread: ...(entry.publishedAt ? { lastModified: new Date(...) }
      : {})

      to avoid emitting undefined/Invalid Date. Static routes first, then

      dynamic content routes. Framework automatically serves /sitemap.xml.


      Testing: mock loaders with vi.mock, call sitemap() directly, assert on

      returned array. Edge cases: empty loaders (only static), missing

      publishedAt (no lastModified key emitted).

      '
    reusable_for:
      - Any future content type added to fabled10x — extend sitemap.ts with additional
        loader call
      - Future free-tools/storefront sitemap additions
  - id: metadataroute_robots_pattern
    established_in: website-foundation-4.1
    established_at: '2026-04-12'
    description: 'src/app/robots.ts: export default function returning MetadataRoute.Robots.

      Permissive stance for fabled10x: { rules: [{ userAgent: ''*'', allow: ''/''
      }], sitemap: ''https://fabled10x.com/sitemap.xml'' }.

      Sync function — no async work needed. Framework serves /robots.txt.

      '
    reusable_for:
      - Any future Next.js project needing robots.txt; customize rules per policy
  - id: url_slug_extraction_with_fallback
    established_in: website-foundation-4.1
    established_at: '2026-04-12'
    description: "Helper pattern for turning an outbound URL into a human-readable\
      \ label:\n  function extractEntrySlug(url: string): string {\n    try {\n  \
      \    const parsed = new URL(url);\n      const last = parsed.pathname.split('/').filter(Boolean).pop();\n\
      \      return last ? last.replace(/-/g, ' ') : parsed.hostname;\n    } catch\
      \ {\n      return url;\n    }\n  }\nFalls back to: root URL → hostname; malformed\
      \ → raw string.\nRender with `className=\"capitalize\"` for title-case display.\n"
    reusable_for:
      - Any future component rendering external URLs that need to show a label
  - id: markdown_renderer_rsc
    established_in: build-in-public-docs-2.1
    established_at: '2026-04-12'
    description: "Runtime markdown rendering for build-log content (job READMEs +\
      \ phase\nfiles) uses react-markdown v9 inside a pure React Server Component\
      \ —\nNO 'use client' directive. The component takes `body: string` and\nrenders\
      \ via ReactMarkdown with a fixed plugin stack:\n  remarkPlugins: [remarkGfm]\n\
      \  rehypePlugins: [rehypeSlug,\n    [rehypeAutolinkHeadings, { behavior: 'append',\n\
      \      properties: { className: ['build-log-anchor'],\n                    'aria-label':\
      \ 'Permalink' } }],\n    rehypeHighlight]\nTwo `components` overrides transform\
      \ element types without touching\nthe HTML string: `h1: → h2` demotes input\
      \ H1s so the page's own H1\n(from Container) stays the sole H1 in the outline,\
      \ and\n`table: → <div.build-log-table-wrapper.overflow-x-auto><table>…` wraps\n\
      wide GFM tables so they scroll horizontally on mobile instead of\nbreaking the\
      \ layout. Styling lives in src/app/globals.css via a\n`.build-log-prose` `@layer\
      \ components` block that references the\nexisting brand tokens (--color-foreground,\
      \ --color-mist, etc.).\nServer-side rendering keeps ~150KB of react-markdown\
      \ + plugins off\nthe client bundle; only highlight.js/styles/github-dark.css\n\
      (<5KB CSS) ships to the browser.\n"
    reusable_for:
      - Sections bpd 2.2 (/build-log index + job + phase pages) and bpd 2.3 (/build-log/status)
        which both mount MarkdownDocument to render markdown bodies from disk
      - Any future section that needs to render trusted markdown from disk (e.g.,
        an /about-long-form page or /changelog route)
      - 'Pattern template: component overrides via react-markdown''s `components`
        prop instead of rewriting HTML strings'
    examples:
      - src/components/build-log/MarkdownDocument.tsx
  - id: rehype_raw_omitted_xss_defense
    established_in: build-in-public-docs-2.1
    established_at: '2026-04-12'
    description: 'Defense-in-depth decision: do NOT add rehype-raw to the rehypePlugins

      array. rehype-raw enables raw-HTML-in-markdown passthrough which is

      an XSS vector — any `<script>` tag or `<img onerror="...">` in source

      markdown would produce a live DOM node. Current build-log content is

      trusted (checked into the repo) but future loader changes might admit

      untrusted sources; blocking raw HTML at the renderer layer means the

      renderer is safe regardless of content provenance. Two security tests

      enforce this: `sec_info_disclosure_script_tag_escaped` (script tag in

      body produces no live <script>) and `sec_tampering_rehype_raw_not_enabled`

      (`<div class="evil">` produces no .evil DOM node). If any future section

      reaches for rehype-raw, a design review is required.

      '
    reusable_for:
      - All future markdown-rendering components (bpd 2.2, 2.3, and any future section
        rendering untrusted markdown)
      - Reference for any future code review catching `rehype-raw` imports
gotchas:
  - id: barrel_integrity_in_git
    established_in: website-foundation-1.1
    description: 'When src/content/schemas/index.ts is untracked in git but re-exports

      from sibling modules that are also untracked, committing only the new

      sibling + the barrel produces a broken commit (missing imports). Either

      commit the pre-existing siblings together with the new one, or commit

      the baseline siblings in a separate prior commit. Section 1.1 chose

      the former.

      '
  - id: zod_4_api_forms
    established_in: website-foundation-1.2
    description: 'Zod 4 (installed as zod@4.3.6) has canonical top-level validators:

      z.url() replaces z.string().url(); z.iso.datetime() replaces

      z.string().datetime(). Both old and new forms work, but new code

      should use z.url() and z.iso.datetime(). z.url() uses WHATWG URL

      parsing — most invalid strings are rejected, but test fixtures must

      use inputs that genuinely fail WHATWG parse (e.g., strings with

      spaces, empty strings). z.enum(CONST_TUPLE) is unchanged in Zod 4.

      '
  - id: content_dirs_dont_preexist
    established_in: website-foundation-2.2
    description: 'src/content/episodes/ and src/content/cases/ directories don''t
      exist

      until seed content creates them. The loaders (episodes.ts, cases.ts)

      use readdir which throws ENOENT on missing dirs. Tests that need real

      filesystem checks should verify directory existence before loader calls.

      '
  - id: loader_dynamic_import_breaks_turbopack_build
    established_in: website-foundation-3.3
    severity: P1
    description: 'npm run build fails on every content detail route that uses

      generateStaticParams + dynamicParams=false. Root cause: src/lib/content/loader.ts:31

      uses a fully dynamic `import(filePath)` expression; Turbopack''s static

      tracer cannot resolve the target, so page-data collection workers throw

      "Cannot find module as expression is too dynamic". Adding

      /* turbopackIgnore: true */ silences the bundler but then falls through

      to raw Node.js which can''t parse .mdx (ERR_UNKNOWN_FILE_EXTENSION).


      Scope: This is pre-existing from section 3.2 (Episodes). Episodes

      shipped with this latent failure because the pipeline skips

      `npm run build` in postflight on the 6GB VPS. Section 3.3 (Cases)

      inherits it — both /episodes/[slug] and /cases/[slug] fail the same way.


      Tests are unaffected — they inject an importFn test seam that bypasses

      the Node/Turbopack import() path entirely (test_seam_injection pattern).


      Fix direction (future job): replace dynamic import() with a static

      import glob or a build-time manifest that Turbopack can trace. Options

      include @next/mdx''s contentlayer-style pattern, or a manifest.ts

      generated at build time. Until fixed, `green.npm_build_passes` and

      `postflight.npm_build` remain N/A for any content-backed detail route.

      '
  - id: rehype_highlight_needs_theme_css
    established_in: build-in-public-docs-2.1
    description: "rehype-highlight itself ships ZERO CSS — it only injects `class=\"\
      hljs\nlanguage-{lang}\"` spans. You MUST separately import a highlight.js\n\
      CSS theme or code blocks render colorless. Tentative default:\n  import 'highlight.js/styles/github-dark.css';\n\
      (at top of the component file). The final theme pick is deferred per\nplanning\
      \ doc §Open Items after brand tokens settle; a swap is a\none-line import change.\
      \ Symptom when forgotten: tests pass\n(hljs-* class detection still works),\
      \ but the rendered UI shows\nunstyled code blocks. JSDOM tests do not apply\
      \ external CSS so the\nunit suite cannot catch this regression; verify via manual\
      \ smoke\nand Lighthouse in bpd 3.1.\n"
open_questions:
  - id: loader_build_incompat
    question: How should loader.ts handle MDX dynamic imports so Turbopack can statically
      trace them?
    raised_in: website-foundation-3.3
    blocks: Production deployment — all content detail routes fail npm run build
    priority: P1
    suggested_followup: Dedicated /jobbuild for loader-v2 with static glob or manifest
website-foundation-4.1:
  completed_at: '2026-04-12'
  patterns_established:
    - id: server_action_with_degraded_env
