        gate. Pattern: FORBIDDEN array of {name, regex, reason}; SKIP_PATHS allow-list
        with

        endsWith suffix match; scanContent(content, file) for in-memory fixture tests;

        scanRepo() with node:fs/promises glob over src/**/*.{ts,tsx,css}; formatReport(hits)

        for triage-friendly multi-line failure messages. Same shape works for the

        forthcoming Phase 9.2 WCAG contrast guard sentinel and any future brand-discipline

        regression guard.

        '
    - description: ROOT constant via fileURLToPath(import.meta.url) for cwd-resilient
        scans
      file: src/__tests__/brand/forbidden-patterns.test.ts (top of file)
      reusable_for: 'Any test or runtime module that needs the repo root without process.cwd().
        Critical

        for sentinels because process.cwd() differs across MAIN and git worktree slots,

        which would make scans pick up files inconsistently. The same pattern fixed
        the

        pipeline-state.test.ts preflight issue (mocked getRepoRoot returning process.cwd()).

        '
    - description: '@types/node@^20 -> node:fs/promises.glob bridge cast'
      file: src/__tests__/brand/forbidden-patterns.test.ts (top of file)
      reusable_for: 'Any code that needs node:fs/promises.glob (stable on Node 22+)
        while the project

        is on @types/node@^20 which lacks the type. Pattern is a one-line typed cast
        with

        an inline comment marking it as a "drop when @types/node bumps to >=22" debt.

        Avoids needing to bump types in every section that touches glob.

        '
  gotchas:
    - 'The pure-black/white/red hex regexes need anchors that distinguish #000 (pure)
      from

      #1C1814 (Ink). Use exactly /#0{3}(?:0{3})?\b/ (allow 3 OR 6 zeros only). The
      looser

      /#0{3,6}\b/ also fires on a 3-zero prefix in 6-digit hexes if their next chars
      happen

      to be word-boundary — false positives on valid colors. Lock to exact 3-or-6
      with the

      optional non-capturing group.

      '
    - 'Tailwind v4 arbitrary-value classes like `text-(--color-ink)` look superficially
      like

      `text-{color}` so the palette regex must require a numeric scale `\d{2,3}` at
      the

      end. Without it, you flag every brand-token class. The regex

      `\b(?:bg|text|border|...)-(?:red|orange|...)-\d{2,3}\b` rejects both

      `text-(--color-ink)` and `text-foreground` cleanly.

      '
    - 'SKIP_PATHS uses endsWith suffix matching, so an entry like

      `forbidden-patterns.test.ts` would skip ANY file ending with that string. Keep
      the

      entries qualified with at least one parent dir segment

      (`src/__tests__/brand/forbidden-patterns.test.ts`) to avoid over-exclusion.

      '
    - 'Origin/main does not build standalone — content loaders for cases/episodes
      still use

      a dynamic import(filePath) that Turbopack rejects as "too dynamic" during page-data

      collection. The user''s MAIN working tree has uncommitted manifest.ts files
      plus a

      loader.ts refactor that fixes this. This section cherry-picks that infra to
      make its

      build gate pass; the change set mirrors MAIN''s local state so the user''s pending

      commit will fast-forward without conflict.

      '
  reusable_utilities:
    - function: scanContent(content, file)
      file: src/__tests__/brand/forbidden-patterns.test.ts
      purpose: 'Scan an in-memory source string for brand-forbidden regex matches,
        returning

        Hit[] (file, pattern, reason, snippet). Honors SKIP_PATHS for the file argument.

        Useful as the unit-test entry point so meta-tests can plant fixture strings

        without writing temp files.

        '
    - function: scanRepo()
      file: src/__tests__/brand/forbidden-patterns.test.ts
      purpose: 'Walk src/**/*.{ts,tsx,css} via node:fs/promises glob and accumulate
        all hits

        across the tree. Catches IO errors as IO_ERROR hits rather than silently

        dropping unreadable files (which could mask real violations).

        '
    - function: formatReport(hits)
      file: src/__tests__/brand/forbidden-patterns.test.ts
      purpose: 'Format Hit[] into a multi-line, triage-friendly failure string with
        one

        block per hit (file / pattern / reason / source-line snippet). Surfaces in

        the vitest failure output so contributors can fix without reading the test.

        '
  deferred_followups:
    - title: Migrate legacy red-* error-message styling
      reason: 'Five components (SignInForm, WaitlistForm, ApplicationForm, BuyButton,
