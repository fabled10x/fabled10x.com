        cohorts applications page) currently use text-red-{600,700} / bg-red-{50}

        / border-red-{300,500} for error states. SKIP_PATHS allow-lists them so the

        sentinel can land green. Migration belongs to the phase that re-themes each

        surface — phase-5 (button primitive), phase-6 (cards), phase-7 (pages).

