    - id: as_const_breaks_mdx_acorn
      description: |
        MDX uses the acorn parser (plain JS, not TypeScript). Seed MDX files
        MUST use `export const meta = { ... };` — NEVER `} as const;`. The
        planning doc's TypeScript-flavored sketch uses `as const` but that
        produces a build/test failure with the error:
          "@mdx-js/rollup: Could not parse import/exports with acorn — Unexpected token"
          at the `as` keyword.
        Existing products/cases/episodes MDX files all correctly omit `as const`
        (precedent at src/content/products/workflow-templates.mdx:16).
        Planning-doc code blocks for MDX files should be edited to remove
        `as const` before being used as templates. Discovery's
        divergences_from_planning_doc should flag this for future cohort-
        adjacent MDX work.
      caught_by: "Green phase: 28/28 tests failed initially with acorn parse error; fix took 2 edits removing 'as const'"

