ce_3_1_patterns:
  - id: formdata_empty_string_preprocess
    established_in: cohort-enrollment-3.1
    established_at: '2026-06-06'
    description: "Zod 4 idiom for optional FormData fields where '' must coerce to\
      \ undefined:\n  z.preprocess(\n    (v) => (typeof v === 'string' && v.length\
      \ === 0 ? undefined : v),\n    z.string().max(N, '...').optional(),\n  )\nCleaner\
      \ than the planning-doc-suggested `.or(z.literal('').transform(() => undefined))`\n\
      because preprocess intercepts before `.optional()` short-circuits and accepts\
      \ ''.\n"
    reusable_for:
      - Any FormData-backed optional string field (referralSource, notes, comments)
      - Future ce-3.2 ApplicationForm extra optional fields if added
  - id: zod4_coerce_number_for_formdata
    established_in: cohort-enrollment-3.1
    established_at: '2026-06-06'
    description: 'Zod 4 syntax for numeric FormData fields: `z.coerce.number().int().min(N).max(M)`.

      Replaces Zod 3 `z.number({ coerce: true })`. Auto-coerces string ''8'' → 8.

      Multiple planning docs reference the old syntax; treat them as needing translation.

      '
    reusable_for:
      - Any FormData number field (commitmentHours, quantity, count)
  - id: db_zod_tuple_invariant
    established_in: cohort-enrollment-3.1
    established_at: '2026-06-06'
    description: "When a `as const` tuple in src/content/schemas/ is reused by BOTH:\n\
      \  (a) Drizzle schema.ts CHECK constraint via sql.raw, AND\n  (b) z.enum(TUPLE)\
      \ in validators.ts\n…the two cannot drift. Tests should assert the invariant:\n\
      \  for (const v of TUPLE) safeParse({...m, field: v}).success === true\n  for\
      \ phantom-non-tuple-strings safeParse(...).success === false\nDiscovered when\
      \ planning doc (drafted pre-ce-2.1) proposed tuple values\ndifferent from the\
      \ values shipped in ce-2.1's CHECK constraint. DB wins.\n"
    reusable_for:
      - Any enum field with a corresponding DB CHECK clause
      - ce-3.2 server action validation (will reuse this schema)
