  - id: styling-overhaul-3.2
    name: BrushstrokeSeam (SVG mask + texture overlay primitive)
    completed_at: '2026-06-06'
    commit_hash: pending
    commit_message: Add BrushstrokeSeam with 43 tests (styling-overhaul-3.2)
    tests: 43
    files_new: 2
    files_modified: 2
    pushed: false
    notes: 'Second feature of styling-overhaul Phase 3 (Material Language). Single

      presentational React Server Component — BrushstrokeSeam — that paints

      an organic feathered seam between two color zones using a composed

      mask (SVG turbulence + linear-gradient via maskComposite=''source-over'').

      Pure presentational primitive: no I/O, no state, no async, no API

      surface, no DB.


      Pattern: ''left''|''right''|''top''|''bottom'' direction maps via Record to

      a mask gradient (to right / to left / to bottom / to top). Inline

      aria-hidden width=0 height=0 SVG carries <filter id="brushstroke-

      feather-{direction}"> (feTurbulence type=''fractalNoise'' baseFrequency

      =''0.015 0.04'' numOctaves=''2'' seed=7 + feDisplacementMap scale=20

      in=''SourceGraphic'') and <mask id="brushstroke-mask-{direction}">

      whose <rect> is filtered through the same turbulence id. Foreground

      layer applies maskImage + WebkitMaskImage = `url(#brushstroke-mask-

      {direction}), linear-gradient({gradient}, black {feather}, transparent)`

      with maskComposite=''source-over''. Root div is ''relative isolate''

