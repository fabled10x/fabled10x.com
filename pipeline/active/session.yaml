      request passes the edge proxy gate.

      KEY DECISION: Next.js 16 deprecated `middleware.ts` in favor of
      `proxy.ts` (function name `proxy`, same matcher config). The
      planning doc references middleware.ts — outdated per
      node_modules/next/dist/docs/01-app/03-api-reference/03-file-conventions/proxy.md.
