      (mechanical update — the whitelist must include every brand-barrel

      sibling). Not a test-intent change. Without this, the prior section''s

      closed-set assertion would have rejected the new barrel addition.


      Test infra fix: changed `masked.style.WebkitMaskImage` (PascalCase)

      reference to a type-asserted form because TS lib.dom.d.ts only declares

      the camelCase `webkitMaskImage`, while jsdom only exposes the PascalCase

      runtime property. Asserting via `(masked.style as unknown as { Webkit

      MaskImage: string }).WebkitMaskImage` keeps both tsc + jsdom happy

      without changing test intent.


