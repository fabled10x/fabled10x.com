      function at src/lib/build-log/derive-live-status.ts mapping inputs to

      a LiveStatus union (''active'' | ''idle'' | ''paused'' | ''stale'' | ''unknown'').

      Decision tree precedence-ordered: null session => unknown; currentAgent

      === pending OR currentStage endsWith -failed => paused; worktree matches

      currentSection => active; no work + <=72h since last completion => idle;

      older or never => stale; session.currentSection set but no matching

      worktree (mid-pipeline race) => idle fallback. Inline mostRecentCompletedAt

