patterns:
  component_pattern:
    example_file: "src/components/brand/DropAccent.tsx"
    example_lines: [1, 32]
    key_aspects:
      - "Pure RSC, no 'use client' directive"
      - "Default props via destructure (size='large')"
      - "Record<Size, classString> for size-driven swap (sizeScale here, sizeClass in DropAccent)"
      - "Inline aria-hidden on decorative spans"
    template: |
      import type { CSSProperties } from 'react';
      interface LogoProps {
        size?: 'sm' | 'md' | 'lg';
        mono?: boolean;
        className?: string;
      }
      const sizeScale: Record<NonNullable<LogoProps['size']>, { wordmark: string; mark: string; gap: string }> = {
        sm: { wordmark: '1rem',   mark: '0.875rem', gap: '0.25rem' },
        md: { wordmark: '1.5rem', mark: '1.25rem',  gap: '0.375rem' },
        lg: { wordmark: '2.5rem', mark: '2rem',     gap: '0.5rem' },
      };
      export function Logo({ size = 'md', mono = false, className = '' }: LogoProps) {
        const s = sizeScale[size];
        const wordmarkColor = mono ? 'currentColor' : 'var(--color-ink)';
        const markColor = mono ? 'currentColor' : 'var(--color-oxblood)';
        const wordmarkStyle: CSSProperties = {
          fontFamily: 'var(--font-display), serif',
          fontWeight: 900,
          fontSize: s.wordmark,
          letterSpacing: '0.06em',
          textTransform: 'uppercase',
          color: wordmarkColor,
          lineHeight: 1,
        };
        const markStyle: CSSProperties = {
          fontFamily: 'var(--font-mono), ui-monospace, monospace',
          fontWeight: 500,
          fontSize: s.mark,
          color: markColor,
          lineHeight: 1,
        };
        return (
          <span className={`inline-flex items-baseline ${className}`} style={{ gap: s.gap }} aria-label="Fabled 10X">
            <span style={wordmarkStyle} aria-hidden="true">FABLED</span>
            <span style={markStyle} aria-hidden="true">{'{10x}'}</span>
          </span>
        );
      }
  hook_pattern:
    not_applicable: "No hooks — pure RSC"
  api_route_pattern:
    not_applicable: "No API endpoints"
  test_pattern:
    example_file: "src/components/brand/__tests__/DropAccent.test.tsx"
    example_lines: [1, 240]
    key_aspects:
      - "render() + container.querySelector for aria-hidden span lookup"
      - "regex match against className for class assertions"
      - "readFileSync + path.join(process.cwd(), 'src/components/brand/<File>.tsx') for no-'use client' source grep"
      - "import * as brandBarrel from '..' to verify barrel re-export"
      - "iterate over SIZES[] / GLYPHS[] for parametric tests"
    template: |
      import { readFileSync } from 'node:fs';
      import { join } from 'node:path';
      import { render } from '@testing-library/react';
      import { describe, it, expect } from 'vitest';
      import { Logo } from '../Logo';
      import * as brandBarrel from '..';

      function getWrapperSpan(container: HTMLElement): HTMLSpanElement | null {
        return container.querySelector('span[aria-label="Fabled 10X"]');
      }
      function getWordmarkSpan(container: HTMLElement): HTMLSpanElement | null {
        return getWrapperSpan(container)?.querySelector('span[aria-hidden="true"]:first-child') ?? null;
      }

