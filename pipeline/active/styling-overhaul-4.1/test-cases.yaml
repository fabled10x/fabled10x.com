security_tests:
  not_applicable: "Pure presentational primitive — no input, no auth, no API. STRIDE applies globally at application level (see interfaces.yaml#stride_global). Same justification as so-3.1, so-3.2, so-2.3, so-2.4."

accessibility_tests:
  - id: "a11y_logo_wrapper_announces_brand_label"
    description: "Wrapper span aria-label='Fabled 10X' — screen readers announce the brand once"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: accessibility
    wcag_category: perceivable
    component: "Logo"
    requirements: ["Wrapper has aria-label='Fabled 10X'", "Wrapper has no other accessible-name override (role, aria-labelledby)"]
  - id: "a11y_logo_inner_parts_hidden_from_screen_readers"
    description: "Inner FABLED + {10x} spans aria-hidden — not announced as 'FABLED open brace 10x close brace'"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: accessibility
    wcag_category: perceivable
    component: "Logo"
    requirements: ["Both inner spans aria-hidden='true'", "Neither inner span carries aria-label or role"]
  - id: "a11y_logo_text_content_matches_visual"
    description: "DOM textContent contains 'FABLED' + '{10x}' so non-AT readers see the brand"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: accessibility
    wcag_category: robust
    component: "Logo"
    requirements: ["wrapper.textContent === 'FABLED{10x}'"]
  - id: "a11y_logo_mono_preserves_aria"
    description: "mono=true does not change aria-label or aria-hidden semantics"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: accessibility
    wcag_category: perceivable
    component: "Logo"
    requirements: ["mono=true wrapper aria-label still 'Fabled 10X'", "inner spans still aria-hidden='true'"]

infrastructure_tests:
