    description: "public/logo.svg starts with <svg ...> root element + xmlns + viewBox 0 0 480 80"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: infrastructure
    concern: headers
  - id: "infra_surface_barrel_export_count_includes_logo"
    description: "Surfaces.test.tsx#infra_surface_barrel_export_count whitelist Set extended to include 'Logo'"
    file: "src/components/brand/__tests__/Surfaces.test.tsx"
    test_type: infrastructure
    concern: headers

edge_case_tests:
  - id: "edge_logo_empty_className_no_double_space"
    description: "className='' (default) — wrapper class string has no doubled spaces (trim/filter applied)"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: edge_case
    category: input
    input: "className=''"
    expected: "Wrapper className === 'inline-flex items-baseline ' or single-trailing-space tolerated; no '  ' double-space"
    checklist_items: [9]
  - id: "edge_logo_className_passthrough"
    description: "className='custom-x' — wrapper className contains 'custom-x' alongside base classes"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: edge_case
    category: input
    input: "className='custom-x'"
    expected: "Wrapper className matches /inline-flex/ AND /items-baseline/ AND /custom-x/"
    checklist_items: [9]
  - id: "edge_logo_mono_combined_with_each_size"
    description: "mono=true × {sm, md, lg} — every combination keeps currentColor on both parts and correct dimensions"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: edge_case
    category: state
    input: "mono=true × size combinatorial"
    expected: "wordmark color='currentColor' regardless of size; sizeScale dimensions preserved"
    checklist_items: [3, 5, 6]
  - id: "edge_logo_mono_false_explicit"
    description: "Explicit mono=false equals default (omitted mono) — same DOM"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: edge_case
    category: input
    input: "mono={false}"
    expected: "Same className + same inline styles as <Logo /> with mono omitted"
    checklist_items: [4]
  - id: "edge_logo_renders_in_currentColor_context"
    description: "mono Logo inside a parent with style={{color:'red'}} — currentColor resolves to red in DOM"
    file: "src/components/brand/__tests__/Logo.test.tsx"
    test_type: edge_case
    category: state
    input: "parent.style.color='red' + mono=true"
    expected: "Both wordmark + mark style.color === 'currentColor' (literal string); inherited via CSS resolution"
    checklist_items: [5, 6]

error_recovery_tests:
  not_applicable: "Sync render — no failure surface, no async operation, no error path. Same as so-2.3 DropAccent / so-3.1 Surfaces / so-3.2 BrushstrokeSeam justification."

